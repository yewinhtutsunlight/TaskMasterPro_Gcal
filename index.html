// ─── GOOGLE CALENDAR API HELPERS ──────────────────────────────────────────────
async function gcalFetch(token, path, method="GET", body=null) {
  const opts = { method, headers:{ Authorization:"Bearer "+token, "Content-Type":"application/json" } };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(GCAL_BASE+path, opts);
  if(!res.ok) throw new Error("GCal API error "+res.status);
  if(res.status===204) return null;
  return res.json();
}

async function gcalListEvents(token) {
  const now = new Date(); now.setDate(now.getDate()-7);
  const end = new Date(); end.setMonth(end.getMonth()+3);
  const params = new URLSearchParams({
    timeMin:now.toISOString(), timeMax:end.toISOString(),
    singleEvents:"true", orderBy:"startTime", maxResults:"500"
  });
  const data = await gcalFetch(token, "/calendars/primary/events?"+params);
  return (data.items||[]).filter(e=>e.status!=="cancelled");
}

async function gcalCreateEvent(token, item) {
  const isApt = item.type==="appointment";
  const startT = isApt ? item.startTime : item.dueTime;
  const endT   = isApt ? item.endTime   : item.dueTime;
  const hasTime = startT && startT.length>0;
  const body = {
    summary: item.title,
    description: "[TaskMaster Pro] "+item.category+" "+item.type+(item.notes?"\n\n"+item.notes:""),
    ...(item.location ? {location:item.location} : {}),
    ...(hasTime ? {
      start:{ dateTime:`${item.dueDate}T${startT}:00+08:00`, timeZone:"Asia/Singapore" },
      end:  { dateTime:`${item.dueDate}T${endT}:00+08:00`,   timeZone:"Asia/Singapore" }
    } : {
      start:{ date:item.dueDate }, end:{ date:item.dueDate }
    }),
    reminders:{ useDefault:false, overrides:[{ method:"popup", minutes:30 }] },
    extendedProperties:{ private:{ taskmaster_id:String(item.id), taskmaster_priority:item.priority } }
  };
  return gcalFetch(token, "/calendars/primary/events", "POST", body);
}

async function gcalDeleteEvent(token, gcalId) {
  return gcalFetch(token, "/calendars/primary/events/"+gcalId, "DELETE");
}

function gcalEventToItem(ev) {
  const dateStr = ev.start?.date || (ev.start?.dateTime||"").slice(0,10);
  const startT  = ev.start?.dateTime ? (ev.start.dateTime||"").slice(11,16) : "";
  const endT    = ev.end?.dateTime   ? (ev.end.dateTime||"").slice(11,16)   : "";
  const isApt   = !!(startT && endT && startT!==endT);
  const tid     = ev.extendedProperties?.private?.taskmaster_id;
  return {
    id: tid || ("gcal_"+ev.id),
    gcalId: ev.id,
    type: isApt ? "appointment" : "task",
    category: "work",
    title: ev.summary || "(No title)",
    priority: ev.extendedProperties?.private?.taskmaster_priority || "medium",
    dueDate: dateStr,
    dueTime: isApt ? "" : startT,
    startTime: isApt ? startT : "",
    endTime: isApt ? endT : "",
    location: ev.location || "",
    notes: (ev.description||"").replace(/\[TaskMaster Pro\][^
]*/,"").trim(),
    recurrence: "none",
    done: false,
    fromGcal: true,
    synced: true,
    actionItems: [],
    createdAt: ev.created || new Date().toISOString(),
  };
}

const WORK_DAYS  = [1,2,3,4,5];
const WORK_START = 9*60+30, WORK_END = 18*60, LUNCH_START = 12*60+30, LUNCH_END = 14*60;
const ALARM_MINUTES = 30;

const toKey    = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayKey = () => toKey(new Date());
const sameDay  = (a,b) => a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
const addDays  = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const toMins   = t => { if(!t) return 0; const[h,m]=t.split(":").map(Number); return h*60+m; };
const toHHMM   = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const fmt      = t => { if(!t) return ""; const[h,m]=t.split(":").map(Number); return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?"PM":"AM"}`; };
const durLabel = (t1,t2) => { const d=toMins(t2)-toMins(t1); if(d<=0) return ""; return d<60?`${d}m`:d%60?`${Math.floor(d/60)}h ${d%60}m`:`${Math.floor(d/60)}h`; };

function getWeekDates(base) {
  const s=new Date(base); s.setDate(s.getDate()-s.getDay()); s.setHours(0,0,0,0);
  return Array.from({length:7},(_,i)=>{ const d=new Date(s); d.setDate(s.getDate()+i); return d; });
}
function findSlots(dateKey, appts) {
  const d=new Date(dateKey); if(!WORK_DAYS.includes(d.getDay())) return [];
  const busy=appts.filter(a=>a.dueDate===dateKey&&a.startTime&&a.endTime)
    .map(a=>({s:toMins(a.startTime),e:toMins(a.endTime)}))
    .concat([{s:LUNCH_START,e:LUNCH_END}]).sort((a,b)=>a.s-b.s);
  const slots=[]; let cur=WORK_START;
  for(const b of busy){ if(cur+60<=b.s) slots.push({s:cur,e:b.s}); cur=Math.max(cur,b.e); }
  if(cur+60<=WORK_END) slots.push({s:cur,e:WORK_END});
  return slots;
}
function generateSuggestions(tasks, allItems) {
  const unscheduled=tasks.filter(t=>!t.done&&!t.dueTime&&t.type==="task");
  const appts=allItems.filter(i=>i.type==="appointment");
  const out=[]; const today=new Date();
  for(const task of unscheduled.slice(0,6)){
    const base=task.dueDate?new Date(task.dueDate):today;
    for(let off=0;off<7;off++){
      const tryDate=toKey(addDays(base,off)); const dd=new Date(tryDate);
      if(!WORK_DAYS.includes(dd.getDay())) continue;
      const slots=findSlots(tryDate,appts);
      if(slots.length){ const sl=slots[0]; out.push({ taskId:task.id, taskTitle:task.title, priority:task.priority, sugDate:tryDate, sugStart:toHHMM(sl.s), sugEnd:toHHMM(Math.min(sl.s+60,sl.e)), dayLabel:off===0?"Today":off===1?"Tomorrow":DAYS_FULL[dd.getDay()] }); break; }
    }
  }
  return out;
}

function getAlarmingItems(items, snoozedIds) {
  const now=new Date(); const nowMins=now.getHours()*60+now.getMinutes(); const todayStr=todayKey();
  return items.filter(item=>{
    if(item.done||snoozedIds.has(item.id)) return false;
    const qualifies=(item.type==="task"&&item.priority==="high")||item.type==="appointment";
    if(!qualifies) return false;
    const timeStr=item.type==="appointment"?item.startTime:item.dueTime;
    if(!timeStr||item.dueDate!==todayStr) return false;
    const minsUntil=toMins(timeStr)-nowMins;
    return minsUntil>=0&&minsUntil<=ALARM_MINUTES;
  });
}
function getOverdueItems(items) {
  const now=new Date(); const nowMins=now.getHours()*60+now.getMinutes(); const todayStr=todayKey();
  return items.filter(item=>{
    if(item.done) return false;
    const qualifies=(item.type==="task"&&item.priority==="high")||item.type==="appointment";
    if(!qualifies) return false;
    if(item.dueDate<todayStr) return true;
    const timeStr=item.type==="appointment"?item.startTime:item.dueTime;
    if(item.dueDate===todayStr&&timeStr) return toMins(timeStr)<nowMins;
    return false;
  });
}
async function sendBrowserNotification(title, body) {
  if(!("Notification" in window)) return;
  if(Notification.permission==="granted") new Notification(title,{body,tag:title});
  else if(Notification.permission!=="denied"){ const p=await Notification.requestPermission(); if(p==="granted") new Notification(title,{body,tag:title}); }
}

function loadData() {
  try {
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d=JSON.parse(raw);
      const seenIds=new Set();
      const deduped=(d.items||[]).filter(i=>{ if(seenIds.has(i.id)) return false; seenIds.add(i.id); return true; });
      const withActions=deduped.map(i=>({actionItems:[],...i}));
      const newSeed=GCAL_SEED.filter(s=>!seenIds.has(s.id));
      return { items:[...withActions,...newSeed], reminders:d.reminders||[] };
    }
    return { items:GCAL_SEED, reminders:[] };
  } catch { return { items:GCAL_SEED, reminders:[] }; }
}
function saveData(d) { try { localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); } catch {} }
function loadSnoozed() { try { return new Set(JSON.parse(localStorage.getItem(SNOOZED_KEY)||"[]")); } catch { return new Set(); } }
function saveSnoozed(s) { try { localStorage.setItem(SNOOZED_KEY,JSON.stringify([...s])); } catch {} }

  const [allGroup, setAllGroup]       = useState("type");
  const [alarmingItems, setAlarmingItems] = useState([]);
  const [overdueAlarms, setOverdueAlarms] = useState([]);
  const [snoozedIds, setSnoozedIds]   = useState(new Set());
  const [dismissedIds, setDismissedIds] = useState(new Set());
  const [notifPerm, setNotifPerm]     = useState("default");
  const [minsNow, setMinsNow]         = useState(new Date().getHours()*60+new Date().getMinutes());
  const lastFiredRef = useRef(new Set());
  const quickRef = useRef(null);
  const [quickText, setQuickText]     = useState("");
  const [quickPriority, setQuickPriority] = useState("high");

  // ── GOOGLE CALENDAR OAUTH & SYNC STATE ──
  const [gcalToken, setGcalToken]   = useState(null);
  const [gcalUser, setGcalUser]     = useState(null);
  const [syncStatus, setSyncStatus] = useState("");
  const [syncing, setSyncing]       = useState(false);
  const [syncLog, setSyncLog]       = useState([]);
  const gcalClientRef = useRef(null);

  const blank  = { type:"task", category:"work", title:"", priority:"high", dueDate:todayKey(), dueTime:"", startTime:"", endTime:"", location:"", notes:"", estimatedMins:60, recurrence:"none", actionItems:[] };
  const blankR = { title:"", date:todayKey(), time:"09:00", notes:"" };
  const [form, setForm]   = useState(blank);
  const [rform, setRform] = useState(blankR);

  useEffect(() => {
    const d=loadData(); setItems(d.items); setReminders(d.reminders);
    setSnoozedIds(loadSnoozed());
    if("Notification" in window) setNotifPerm(Notification.permission);
    // Restore saved token
    const savedTok = localStorage.getItem(GCAL_TOKEN_KEY);
    if(savedTok) { try { const t=JSON.parse(savedTok); if(t.expires>Date.now()) { setGcalToken(t.access_token); setGcalUser(t.email||USER_EMAIL); } } catch {} }
  }, []);

  // Init Google OAuth client once GSI script loads
  useEffect(() => {
    if(!IS_CONFIGURED) return;
    const init = () => {
      if(!window.google?.accounts?.oauth2) return;
      gcalClientRef.current = window.google.accounts.oauth2.initTokenClient({
        client_id: GCAL_CLIENT_ID,
        scope: GCAL_SCOPE,
        callback: (resp) => {
          if(resp.access_token) {
            setGcalToken(resp.access_token);
            setGcalUser(USER_EMAIL);
            const expiry = Date.now() + (resp.expires_in||3600)*1000;
            localStorage.setItem(GCAL_TOKEN_KEY, JSON.stringify({ access_token:resp.access_token, expires:expiry, email:USER_EMAIL }));
            setSyncStatus("✅ Connected to Google Calendar!");
          } else { setSyncStatus("❌ Sign-in failed. Try again."); }
        }
      });
    };
    if(window.google) init(); else window.addEventListener('load', init);
  }, []);

  const signInGcal = () => {
    if(!IS_CONFIGURED) { setSyncStatus("⚠️ Please add your Google Client ID first. See setup instructions in the Sync tab."); return; }
    if(!gcalClientRef.current) { setSyncStatus("Google not loaded yet. Try again in a moment."); return; }
    gcalClientRef.current.requestAccessToken();
  };

  const signOutGcal = () => {
    setGcalToken(null); setGcalUser(null);
    localStorage.removeItem(GCAL_TOKEN_KEY);
    setSyncStatus("Disconnected from Google Calendar.");
  };

  const addSyncLog = (msg, ok=true) => setSyncLog(p=>[{msg,ok,ts:new Date().toLocaleTimeString()},...p].slice(0,30));

  // PULL from Google Calendar → merge into app
  const pullFromGcal = async () => {
    if(!gcalToken) { setSyncStatus("Please sign in first."); return; }
    setSyncing(true); setSyncStatus("⏳ Pulling from Google Calendar...");
    try {
      const events = await gcalListEvents(gcalToken);
      const current = [...items]; const seenIds = new Set(current.map(i=>i.gcalId).filter(Boolean));
      let added=0;
      for(const ev of events) {
        if(ev.summary?.includes("TaskMaster")) continue; // skip our own summary events
        if(!seenIds.has(ev.id)) {
          const item = gcalEventToItem(ev);
          // If we created this item (has taskmaster_id), update not duplicate
          const existingIdx = current.findIndex(i=>i.id===item.id);
          if(existingIdx>=0) { current[existingIdx]={...current[existingIdx], gcalId:ev.id, synced:true}; }
          else { current.push(item); added++; }
          seenIds.add(ev.id);
        }
      }
      const clean = persist(current, null); setItems(clean);
      const msg = `✅ Pulled ${added} new event${added!==1?"s":""} from Google Calendar`;
      setSyncStatus(msg); addSyncLog(msg);
    } catch(e) { const msg="❌ Pull failed: "+e.message; setSyncStatus(msg); addSyncLog(msg,false); }
    setSyncing(false);
  };

  // PUSH single item to Google Calendar
  const pushToGcal = async (item) => {
    if(!gcalToken) return;
    try {
      const ev = await gcalCreateEvent(gcalToken, item);
      if(ev?.id) {
        const u = items.map(i=>i.id===item.id?{...i,gcalId:ev.id,synced:true}:i);
        setItems(u); persist(u, null);
        addSyncLog("✅ Pushed: "+item.title);
      }
    } catch(e) { addSyncLog("❌ Push failed: "+item.title+" — "+e.message, false); }
  };

  // DELETE from Google Calendar
  const deleteFromGcal = async (gcalId) => {
    if(!gcalToken||!gcalId) return;
    try { await gcalDeleteEvent(gcalToken, gcalId); addSyncLog("🗑 Deleted from GCal"); }
    catch(e) { addSyncLog("⚠️ GCal delete failed: "+e.message, false); }
  };

  const persist = useCallback((it,rm) => {
    const seenIds=new Set();
    const clean=(it??items).filter(i=>{ if(seenIds.has(i.id)) return false; seenIds.add(i.id); return true; });
    saveData({ items:clean, reminders:rm??reminders }); return clean;
  }, [items, reminders]);

  useEffect(() => { if(items.length>0) setSuggestions(generateSuggestions(items,items)); }, [items]);

  useEffect(() => {
    const tick = () => {
      const now=new Date(); setMinsNow(now.getHours()*60+now.getMinutes());
      const alarming=getAlarmingItems(items,snoozedIds).filter(i=>!dismissedIds.has(i.id));
      const overdue=getOverdueItems(items).filter(i=>!dismissedIds.has(i.id));
      setAlarmingItems(alarming); setOverdueAlarms(overdue);
      for(const item of alarming){
        if(!lastFiredRef.current.has(item.id)){
          lastFiredRef.current.add(item.id);
          const t=item.type==="appointment"?item.startTime:item.dueTime;
          const m=toMins(t)-(now.getHours()*60+now.getMinutes());
          sendBrowserNotification(`⏰ ${item.type==="appointment"?"Meeting":"Task"} in ${m} min`,item.title);
        }
      }
    };
    tick();
    const iv=setInterval(tick, 15*60*1000);
    return () => clearInterval(iv);
  }, [items, snoozedIds, dismissedIds]);

  const snoozeItem = (id,mins=10) => {
    const n=new Set([...snoozedIds,id]); setSnoozedIds(n); saveSnoozed(n);

    const u=[...items.map(i=>i.id===meeting.id?{...i,actionItems:(i.actionItems||[]).filter(a=>a.id!==action.id)}:i),newTask];

    if(detailItem?.id===meeting.id) setDetailItem(clean.find(i=>i.id===meeting.id));
  };

  const addItem = () => {
    if(!form.title.trim()) return;
    const item={...form,id:`user_${Date.now()}`,done:false,createdAt:new Date().toISOString()};

  const addReminder = () => {
    if(!rform.title.trim()) return;

    const timeLabel=isApt&&item.startTime&&item.endTime?`${fmt(item.startTime)} – ${fmt(item.endTime)}`:item.dueTime?fmt(item.dueTime):"";
    const dur=isApt?durLabel(item.startTime,item.endTime):item.estimatedMins?`~${item.estimatedMins<60?item.estimatedMins+"m":Math.floor(item.estimatedMins/60)+"h"}`:"";
    const actionsDone=(item.actionItems||[]).filter(a=>a.done).length;

    return (

      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={S.secTitle}>{DAYS_FULL[selDate.getDay()]}, {MONTHS[selDate.getMonth()]} {selDate.getDate()}</div>
          <div style={{display:"flex",gap:4}}>{["type","priority","category"].map(g=><button key={g} style={S.groupBtn(weekGroup===g,C.blue)} onClick={()=>setWeekGroup(g)}>{g==="type"?"Type":g==="priority"?"Pri":"Cat"}</button>)}</div>
        </div>
        {calItems.length===0&&calReminders.length===0?<div style={S.empty}><div style={{fontSize:28,marginBottom:4}}>📋</div>Nothing to show{filterType!=="all"?" — try changing filter":""}</div>:<BreakdownSection groupMode={weekGroup} itemList={calItems}/>}
        {calReminders.map(r=><div key={r.id} style={S.remCard}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:"#92400E",marginBottom:3}}>🔔 {r.title}</div><span style={{...S.tTag,color:C.amber,background:"#FEF3C7"}}>{fmt(r.time)}</span></div><button style={S.delBtn} onClick={()=>deleteReminder(r.id)}>✕</button></div>)}
      </div>
      {allOverdue.length>0&&isCurrentWk&&(filterType==="all"||filterType==="task")&&<div style={S.card}><div style={S.secTitle}>⚠️ Overdue</div>{allOverdue.map(i=><ItemCard key={i.id} item={i} showDate/>)}</div>}
      {suggestions.length>0&&(filterType==="all"||filterType==="task")&&<div style={S.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={S.secTitle}>✨ Suggestions</div><button style={{background:"none",border:"none",color:C.textL,fontSize:11,cursor:"pointer"}} onClick={()=>setShowSuggest(!showSuggest)}>{showSuggest?"Hide":"Show"}</button></div>{!showSuggest?<div style={{fontSize:12,color:C.textL}}>{suggestions.length} tasks need a time slot</div>:suggestions.map(sug=><div key={sug.taskId} style={S.sugCard}><div style={{fontSize:13,fontWeight:700,color:"#065F46",marginBottom:3}}>"{sug.taskTitle}"</div><div style={{fontSize:11,color:"#059669",marginBottom:8}}>💡 {sug.dayLabel} · {fmt(sug.sugStart)} – {fmt(sug.sugEnd)}</div><div style={{display:"flex",gap:6}}><button style={{flex:1,padding:"7px",borderRadius:9,border:"1.5px solid #059669",background:"#059669",color:"#fff",fontWeight:700,fontSize:11,cursor:"pointer"}} onClick={()=>acceptSug(sug)}>✓ Accept</button><button style={{flex:1,padding:"7px",borderRadius:9,border:`1.5px solid ${C.border}`,background:"#fff",color:C.textL,fontWeight:700,fontSize:11,cursor:"pointer"}} onClick={()=>setSuggestions(p=>p.filter(s=>s.taskId!==sug.taskId))}>Dismiss</button></div></div>)}</div>}
    </>);
  };

  // ── ALL TAB ──
  const renderAll = () => {
    const allP=items.filter(i=>!i.done&&i.type==="task"); const hi=allP.filter(i=>i.priority==="high").length; const md=allP.filter(i=>i.priority==="medium").length; const lo=allP.filter(i=>i.priority==="low").length; const mt=items.filter(i=>i.type==="appointment"&&!i.done).length;
    return (<>
      <div style={S.card}><div style={S.secTitle}>All Outstanding</div>
        <div style={S.pillRow}>
          {(filterType==="all"||filterType==="task")&&<><div style={S.pill(C.red,C.redL)}>🔴 {hi} high</div><div style={S.pill(C.amber,C.amberL)}>🟡 {md} med</div><div style={S.pill(C.green,C.greenL)}>🟢 {lo} low</div></>}
          {(filterType==="all"||filterType==="appointment")&&<div style={S.pill(C.blue,C.blueL)}>📅 {mt} meetings</div>}
        </div>
        <div style={S.groupRow}>{["type","priority","category"].map(g=><button key={g} style={S.groupBtn(allGroup===g,C.blue)} onClick={()=>setAllGroup(g)}>{g==="type"?"By Type":g==="priority"?"By Priority":"By Category"}</button>)}</div>
      </div>
      <div style={S.card}><BreakdownSection groupMode={allGroup} itemList={allFiltered}/></div>
    </>);
  };

  const isApt=form.type==="appointment";

  return (
    <div style={S.wrap}>
      <div style={S.hdr}>
        <div style={S.greeting}>Good {today.getHours()<12?"Morning":today.getHours()<18?"Afternoon":"Evening"}, Ye Win 👋</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={S.appName}>TaskMaster Pro</div>
          <div style={{background:"rgba(255,255,255,0.2)",borderRadius:20,padding:"4px 10px",fontSize:10,color:"#fff",fontWeight:700}}>✅ GCal Live</div>
        </div>
        <div style={S.subLine}>{USER_EMAIL} · SGT</div>
        <div style={S.statsRow}>
          <div style={S.stat}><div style={S.statN()}>{todayPending}</div><div style={S.statL}>Today</div></div>
          <div style={S.stat}><div style={S.statN()}>{weekPending.length}</div><div style={S.statL}>This Wk</div></div>
          <div style={S.stat}><div style={S.statN()}>{weekMeetings.length}</div><div style={S.statL}>Meetings</div></div>
          <div style={S.stat}><div style={S.statN(totalAlerts>0?"#FCA5A5":undefined)}>{totalAlerts}</div><div style={S.statL}>Alerts</div></div>
        </div>
        <div style={S.tabBar}>
          {[["alarms","⏰ Alarms"],["week","📅 Week"],["all","📋 All"],["reminders","🔔 Alerts"],["sync","🔗 Sync"]].map(([k,l])=>(
            <button key={k} style={S.tabBtn(tab===k)} onClick={()=>setTab(k)}>{l}{k==="alarms"&&totalAlerts>0&&<span style={S.alarmDot}/>}</button>
          ))}
        </div>
      </div>

      {(tab==="week"||tab==="all")&&(
        <div style={S.quickBar}>
          <div style={S.quickLabel}>⚡ Quick Add Task</div>
          <div style={S.quickRow}>
            <input ref={quickRef} style={S.quickInput} placeholder="Type task, press Enter…" value={quickText} onChange={e=>setQuickText(e.target.value)} onKeyDown={handleQuickAdd}/>
            <div style={S.quickPriRow}>
              {["high","medium","low"].map(p=><button key={p} style={S.quickPBtn(quickPriority===p,p)} onClick={()=>setQuickPriority(p)}>{p==="high"?"H":p==="medium"?"M":"L"}</button>)}
            </div>
            <button style={S.quickAddBtn} onClick={handleQuickAdd}>+</button>
          </div>
        </div>
      )}

      {(tab==="week"||tab==="all")&&(
        <div style={S.filterBar}>
          <span style={S.filterLabel}>Show:</span>
          {[["all","All","#475569","#F1F5F9"],["task","Tasks 📋","#DC2626","#FEF2F2"],["appointment","Meetings 📅","#1D4ED8","#EFF6FF"]].map(([v,l,c,bg])=>(
            <button key={v} style={S.fBtn(filterType===v,c,bg)} onClick={()=>setFilterType(v)}>{l}</button>
          ))}
          <div style={S.divider}/>
          {[["all","All","#475569","#F1F5F9"],["work","💼","#1D4ED8","#EFF6FF"],["personal","🏠","#7C3AED","#F5F3FF"]].map(([v,l,c,bg])=>(
            <button key={v} style={S.fBtn(filterCat===v,c,bg)} onClick={()=>setFilterCat(v)}>{l}</button>
          ))}
        </div>
      )}

      <div style={S.content}>
        {tab==="alarms"    && renderAlarms()}
        {tab==="week"      && renderWeek()}
        {tab==="all"       && renderAll()}
        {tab==="sync" && (() => {
          const C2={blue:"#1E40AF",blueL:"#DBEAFE",green:"#059669",greenL:"#F0FDF4",red:"#DC2626",redL:"#FEF2F2",amber:"#D97706",border:"#E2E8F0",textL:"#94A3B8",textM:"#475569",text:"#1E293B",card:"#FFFFFF",teal:"#0D9488",tealL:"#F0FDFA"};
          return (<>
            {/* Connection Card */}
            <div style={{background:C2.card,borderRadius:14,padding:16,marginBottom:10,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
              <div style={{fontSize:10,fontWeight:800,letterSpacing:2.5,color:C2.textL,textTransform:"uppercase",marginBottom:12}}>Google Calendar Sync</div>
              {gcalToken ? (<>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                  <div style={{width:40,height:40,borderRadius:"50%",background:C2.greenL,border:"2px solid #A7F3D0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>✅</div>
                  <div><div style={{fontSize:14,fontWeight:800,color:C2.text}}>Connected</div><div style={{fontSize:11,color:C2.textL}}>{gcalUser||USER_EMAIL}</div></div>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:10}}>
                  <button style={{flex:1,padding:"11px 0",background:`linear-gradient(135deg,${C2.blue},#0EA5E9)`,border:"none",borderRadius:11,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}} onClick={pullFromGcal} disabled={syncing}>{syncing?"⏳ Syncing…":"⬇️ Pull from GCal"}</button>
                </div>
                <button style={{width:"100%",padding:"10px",background:"transparent",border:`1.5px solid ${C2.border}`,borderRadius:11,color:C2.textL,fontSize:13,fontWeight:700,cursor:"pointer"}} onClick={signOutGcal}>Disconnect</button>
                {syncStatus&&<div style={{marginTop:10,background:syncStatus.startsWith("✅")?C2.greenL:syncStatus.startsWith("❌")?"#FEF2F2":C2.blueL,border:`1.5px solid ${syncStatus.startsWith("✅")?"#A7F3D0":syncStatus.startsWith("❌")?"#FECACA":"#BFDBFE"}`,borderRadius:10,padding:"9px 12px",fontSize:12,color:syncStatus.startsWith("✅")?C2.green:syncStatus.startsWith("❌")?C2.red:C2.blue}}>{syncStatus}</div>}
              </>) : (<>
                <div style={{fontSize:12,color:C2.textM,lineHeight:1.8,marginBottom:14}}>Connect your Google Calendar to sync tasks and meetings across all your devices — phone, computer, tablet.</div>
                <button style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#4285F4,#1E40AF)",border:"none",borderRadius:12,color:"#fff",fontSize:14,fontWeight:900,cursor:"pointer"}} onClick={signInGcal}>
                  🔐 Sign in with Google
                </button>
                {!IS_CONFIGURED&&<div style={{marginTop:12,background:"#FFFBEB",border:"1.5px solid #FDE68A",borderRadius:11,padding:"12px 13px",fontSize:12,color:"#92400E",lineHeight:1.8}}>
                  <strong>⚠️ One-time setup required (5 min):</strong><br/>
                  1. Go to <strong>console.cloud.google.com</strong><br/>
                  2. Create a project → Enable <strong>Google Calendar API</strong><br/>
                  3. APIs &amp; Services → Credentials → <strong>Create OAuth 2.0 Client ID</strong> (Web app)<br/>
                  4. Add <code>file:///</code> to Authorized JavaScript Origins<br/>
                  5. Copy the Client ID and open this HTML file in a text editor<br/>
                  6. Replace <code>859742900088-8d3lfkantkgcsp23m1o06u52c02o2a5q</code> near the top with your Client ID<br/>
                  7. Save and reopen the HTML file
                </div>}
                {syncStatus&&<div style={{marginTop:10,background:"#FEF2F2",border:"1.5px solid #FECACA",borderRadius:10,padding:"9px 12px",fontSize:12,color:C2.red}}>{syncStatus}</div>}
              </>)}
            </div>

            {/* How it works */}
            <div style={{background:C2.card,borderRadius:14,padding:16,marginBottom:10,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
              <div style={{fontSize:11,fontWeight:800,color:C2.blue,marginBottom:10}}>How sync works</div>
              <div style={{fontSize:12,color:C2.textM,lineHeight:2}}>
                ✅ <strong>Add task/meeting</strong> → auto-pushes to Google Calendar<br/>
                🗑 <strong>Delete item</strong> → removes from Google Calendar too<br/>
                ⬇️ <strong>Pull button</strong> → imports new GCal events into app<br/>
                📱 <strong>Cross-device</strong> → use Pull on any device to stay in sync<br/>
                ⏰ <strong>30-min alarm</strong> → set automatically on all GCal events
              </div>
            </div>

            {/* Stats */}
            <div style={{background:C2.card,borderRadius:14,padding:16,marginBottom:10,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
              <div style={{fontSize:11,fontWeight:800,color:C2.textL,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Stats</div>
              <div style={{fontSize:12,color:C2.textM,lineHeight:2.2}}>
                Total items: <strong>{items.length}</strong><br/>
                Synced to GCal: <strong style={{color:C2.green}}>{items.filter(i=>i.synced||i.fromGcal).length}</strong><br/>
                App-only (not yet synced): <strong style={{color:C2.amber}}>{items.filter(i=>!i.synced&&!i.fromGcal).length}</strong><br/>
                Reminders: <strong>{reminders.length}</strong>
              </div>
            </div>

            {/* Sync log */}
            {syncLog.length>0&&<div style={{background:C2.card,borderRadius:14,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
              <div style={{fontSize:11,fontWeight:800,color:C2.textL,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Activity Log</div>
              {syncLog.map((l,i)=><div key={i} style={{fontSize:11,color:l.ok?C2.green:C2.red,padding:"4px 0",borderBottom:`1px solid ${C2.border}`,display:"flex",gap:8}}><span style={{color:C2.textL,fontSize:9,flexShrink:0}}>{l.ts}</span>{l.msg}</div>)}
            </div>}
          </>);
        })()}
        {tab==="reminders" && (
          <div style={S.card}>
            <div style={S.secTitle}>All Reminders</div>
            {reminders.length===0?<div style={S.empty}><div style={{fontSize:36,marginBottom:6}}>🔔</div>No reminders</div>
              :[...reminders].sort((a,b)=>new Date(`${a.date}T${a.time}`)-new Date(`${b.date}T${b.time}`)).map(r=>(
                <div key={r.id} style={S.remCard}>
                  <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:"#92400E",marginBottom:4}}>🔔 {r.title}</div><div style={{display:"flex",gap:6}}><span style={{...S.tTag,color:C.amber,background:"#FEF3C7"}}>📅 {r.date}</span><span style={{...S.tTag,color:C.amber,background:"#FEF3C7"}}>{fmt(r.time)}</span></div>{r.notes&&<div style={{fontSize:10,color:"#92400E80",marginTop:3}}>{r.notes}</div>}</div>
                  <button style={S.delBtn} onClick={()=>deleteReminder(r.id)}>✕</button>
                </div>
              ))
            }
          </div>
        )}
      </div>

      {tab!=="alarms"&&<button style={S.fab(tab==="reminders"?C.amber:C.blue)} onClick={()=>{ if(tab==="reminders"){setRform(blankR);setModal("reminder");}else{setForm(blank);setModal("task");} }}>+</button>}

      <div style={S.nav}>
        {[["alarms","⏰","Alarms"],["week","📅","Week"],["all","📋","All"],["reminders","🔔","Alerts"],["sync","🔗","Sync"]].map(([k,icon,l])=>(
          <button key={k} style={S.navBtn(tab===k)} onClick={()=>setTab(k)}>
            <span>{icon}</span><span style={S.navLbl(tab===k)}>{l}</span>
            {k==="alarms"&&totalAlerts>0&&<span style={S.navAlert}/>}
          </button>
        ))}
      </div>

      {modal==="task"&&(
        <div style={S.overlay} onClick={()=>setModal(null)}><div style={S.sheet} onClick={e=>e.stopPropagation()}>
          <div style={S.mTitle}>➕ New {isApt?"Meeting":"Task"}</div>
          <div style={S.lbl}>Type</div><div style={S.segRow}><button style={S.seg(form.type==="task","#DC2626","#FEF2F2")} onClick={()=>setForm({...form,type:"task"})}>✅ Task</button><button style={S.seg(form.type==="appointment",C.blue,C.blueL)} onClick={()=>setForm({...form,type:"appointment"})}>📅 Meeting</button></div>
          <div style={S.lbl}>Category</div><div style={S.segRow}><button style={S.seg(form.category==="work",C.blue,C.blueL)} onClick={()=>setForm({...form,category:"work"})}>💼 Work</button><button style={S.seg(form.category==="personal",C.purple,C.purpleL)} onClick={()=>setForm({...form,category:"personal"})}>🏠 Personal</button></div>
          <input style={S.inp} placeholder={isApt?"Meeting title...":"Task title..."} value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/>
          {!isApt&&<><div style={S.lbl}>Priority</div><div style={S.priRow}>{["high","medium","low"].map(p=><button key={p} style={S.priBtn(form.priority===p,p)} onClick={()=>setForm({...form,priority:p})}>{PRIORITY[p].label}</button>)}</div></>}
          <div style={S.row2}>
            <div style={{flex:1}}><div style={S.lbl}>Date</div><input type="date" style={{...S.inp,marginBottom:0}} value={form.dueDate} onChange={e=>setForm({...form,dueDate:e.target.value})}/></div>
            {!isApt&&<div style={{flex:1}}><div style={S.lbl}>Time (opt.)</div><input type="time" style={{...S.inp,marginBottom:0}} value={form.dueTime} onChange={e=>setForm({...form,dueTime:e.target.value})}/></div>}
          </div>
          {isApt&&<><div style={{height:7}}/><div style={S.row2}><div style={{flex:1}}><div style={S.lbl}>Start</div><input type="time" style={{...S.inp,marginBottom:0}} value={form.startTime} onChange={e=>setForm({...form,startTime:e.target.value})}/></div><div style={{flex:1}}><div style={S.lbl}>End</div><input type="time" style={{...S.inp,marginBottom:0}} value={form.endTime} onChange={e=>setForm({...form,endTime:e.target.value})}/></div></div>{form.startTime&&form.endTime&&toMins(form.endTime)>toMins(form.startTime)&&<div style={{fontSize:11,color:C.blue,marginBottom:6}}>⏱ {durLabel(form.startTime,form.endTime)}</div>}<input style={S.inp} placeholder="Location (optional)..." value={form.location} onChange={e=>setForm({...form,location:e.target.value})}/></>}
          {!isApt&&<><div style={S.lbl}>Est. Time</div><div style={S.estRow}>{[30,60,90,120].map(m=><button key={m} style={S.estBtn(form.estimatedMins===m)} onClick={()=>setForm({...form,estimatedMins:m})}>{m<60?m+"m":m/60+"h"}</button>)}</div></>}
          <div style={S.lbl}>Repeat</div><div style={S.recRow}>{RECURRENCE_OPTS.map(r=><button key={r.value} style={S.recBtn(form.recurrence===r.value)} onClick={()=>setForm({...form,recurrence:r.value})}>{r.label}</button>)}</div>
          <div style={S.lbl}>Notes (optional)</div>
          <textarea style={S.textarea} placeholder="Notes, specs, contact info…" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
          {((form.type==="task"&&form.priority==="high"&&form.dueTime)||(form.type==="appointment"&&form.startTime))&&<div style={{background:"#FEF3C7",border:"1.5px solid #FDE68A",borderRadius:10,padding:"8px 12px",marginBottom:8,fontSize:11,color:C.amber,fontWeight:600}}>⏰ Alarm will fire 30 min before</div>}
          <button style={S.aBtn(isApt?C.blue:C.red)} onClick={addItem}>{isApt?"📅 Add Meeting":"✅ Add Task"}</button>
          <button style={S.cancelBtn} onClick={()=>setModal(null)}>Cancel</button>
        </div></div>
      )}

      {modal==="reminder"&&(
        <div style={S.overlay} onClick={()=>setModal(null)}><div style={S.sheet} onClick={e=>e.stopPropagation()}>
          <div style={S.mTitle}>🔔 New Reminder</div>
          <input style={S.inp} placeholder="Reminder title..." value={rform.title} onChange={e=>setRform({...rform,title:e.target.value})}/>
          <div style={S.row2}><div style={{flex:1}}><div style={S.lbl}>Date</div><input type="date" style={{...S.inp,marginBottom:0}} value={rform.date} onChange={e=>setRform({...rform,date:e.target.value})}/></div><div style={{flex:1}}><div style={S.lbl}>Time</div><input type="time" style={{...S.inp,marginBottom:0}} value={rform.time} onChange={e=>setRform({...rform,time:e.target.value})}/></div></div>
          <div style={{height:7}}/><input style={S.inp} placeholder="Notes..." value={rform.notes} onChange={e=>setRform({...rform,notes:e.target.value})}/>
          <button style={S.aBtn(C.amber)} onClick={addReminder}>🔔 Set Reminder</button>
          <button style={S.cancelBtn} onClick={()=>setModal(null)}>Cancel</button>
        </div></div>
      )}

      {deferItem&&<div style={S.overlay} onClick={()=>setDeferItem(null)}><div style={{...S.sheet,padding:"18px 15px 36px"}} onClick={e=>e.stopPropagation()}><div style={S.mTitle}>↷ Defer to Next Week</div><div style={{fontSize:14,color:C.textM,marginBottom:12}}>Move <strong>"{deferItem.title}"</strong>?</div><div style={{background:C.greenL,border:"1.5px solid #A7F3D0",borderRadius:11,padding:"11px",marginBottom:14,fontSize:13,color:"#065F46"}}>New date: <strong>{toKey(addDays(new Date(deferItem.dueDate),7))}</strong></div><button style={S.aBtn(C.purple)} onClick={()=>deferToNextWeek(deferItem)}>↷ Move to Next Week</button><button style={S.cancelBtn} onClick={()=>setDeferItem(null)}>Cancel</button></div></div>}

      {extendItem&&<div style={S.overlay} onClick={()=>setExtendItem(null)}><div style={{...S.sheet,padding:"18px 15px 36px"}} onClick={e=>e.stopPropagation()}><div style={S.mTitle}>+ Add More Time</div><div style={{fontSize:13,color:C.textM,marginBottom:4}}>"{extendItem.title}"</div><div style={{fontSize:11,color:C.textL,marginBottom:14}}>Current: <strong>{extendItem.estimatedMins||60}m</strong></div><div style={{display:"flex",gap:7,marginBottom:10}}>{[30,60,90,120].map(m=><button key={m} style={{flex:1,padding:"13px 0",borderRadius:11,border:`1.5px solid ${C.border}`,background:"#F8FAFC",color:C.blue,fontWeight:800,fontSize:13,cursor:"pointer"}} onClick={()=>extendTime(extendItem,m)}>+{m<60?m+"m":m/60+"h"}</button>)}</div><button style={S.cancelBtn} onClick={()=>setExtendItem(null)}>Cancel</button></div></div>}

      {detailItem&&<DetailModal/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
