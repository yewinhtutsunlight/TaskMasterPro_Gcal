<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="TaskMaster Pro"/>
<title>TaskMaster Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F1F5F9;min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#fff;position:relative}
.header{background:linear-gradient(135deg,#1E3A5F 0%,#2D5986 100%);color:#fff;padding:16px 16px 0}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.greeting{font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:.5px}
.app-title{font-size:26px;font-weight:700;letter-spacing:-.5px}
.header-meta{font-size:11px;opacity:.6;margin-bottom:12px}
.header-badges{display:flex;gap:6px;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;transition:background .2s}
.badge.active{background:rgba(255,255,255,.3)}
.badge.gcal-live{color:#4ADE80}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.stat{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 4px;text-align:center}
.stat-num{font-size:22px;font-weight:700;line-height:1}
.stat-num.danger{color:#F87171}
.stat-num.warn{color:#FCD34D}
.stat-label{font-size:9px;opacity:.7;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.2)}
.tab-btn{flex:1;padding:10px 4px;font-size:11px;font-weight:600;text-align:center;background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;position:relative;text-transform:uppercase;letter-spacing:.3px}
.tab-btn.active{color:#fff;border-bottom:2px solid #fff}
.tab-btn .dot{position:absolute;top:6px;right:50%;transform:translateX(8px);width:6px;height:6px;border-radius:50%;background:#F87171}
.content{flex:1;overflow-y:auto;padding:0 0 80px}
.section-header{display:flex;align-items:center;gap:6px;padding:14px 16px 6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#64748B}
.section-header.danger{color:#DC2626}
.section-header.success{color:#059669}
.overdue-banner{margin:12px 16px 0;background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:13px;color:#DC2626;font-weight:600}
.view-toggles{display:flex;gap:6px;padding:10px 16px 4px;overflow-x:auto}
.view-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid #E2E8F0;background:#fff;font-size:12px;font-weight:600;color:#64748B;cursor:pointer;white-space:nowrap}
.view-btn.active{background:#1E3A5F;color:#fff;border-color:#1E3A5F}
.filter-row{display:flex;gap:6px;padding:6px 16px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-pill{flex-shrink:0;padding:4px 12px;border-radius:20px;border:1px solid #E2E8F0;background:#fff;font-size:12px;font-weight:500;color:#64748B;cursor:pointer;white-space:nowrap}
.filter-pill.active{background:#1E3A5F;color:#fff;border-color:#1E3A5F}
.task-card{margin:4px 16px;background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;transition:box-shadow .2s}
.task-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.task-card.done{opacity:.5}
.task-check{width:20px;height:20px;border-radius:50%;border:2px solid #CBD5E1;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s}
.task-check.checked{background:#059669;border-color:#059669;color:#fff}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:600;color:#1E293B;margin-bottom:4px;line-height:1.3}
.task-title.done{text-decoration:line-through;color:#94A3B8}
.task-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.meta-chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 7px;border-radius:10px;font-weight:500}
.meta-date{background:#F1F5F9;color:#64748B}
.meta-date.overdue{background:#FEF2F2;color:#DC2626}
.meta-priority{color:#fff}
.meta-gcal{background:#EEF2FF;color:#6366F1}
.meta-project{background:#F0FDF4;color:#059669}
.meta-assignee{background:#FFF7ED;color:#C2410C}
.meta-stage{background:#F5F3FF;color:#7C3AED}
.meta-energy{font-size:10px}
.task-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;font-size:14px;line-height:1;color:#94A3B8;transition:color .2s}
.icon-btn:hover{color:#1E293B}
.add-task-row{margin:6px 16px;padding:10px 14px;border:1px dashed #CBD5E1;border-radius:12px;display:flex;align-items:center;gap:8px;cursor:pointer;color:#94A3B8;font-size:13px}
.add-task-row:hover{border-color:#1E3A5F;color:#1E3A5F}
.completed-toggle{margin:8px 16px 0;padding:8px 14px;background:#F8FAFC;border-radius:10px;border:1px solid #E2E8F0;cursor:pointer;font-size:12px;color:#64748B;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.project-group{margin:8px 16px 0;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden}
.project-group-header{padding:10px 14px;background:#F8FAFC;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.project-group-title{font-size:13px;font-weight:700;color:#1E293B}
.project-group-meta{font-size:11px;color:#64748B}
.project-group-tasks{padding:4px 0}
.project-group-tasks .task-card{margin:4px 10px}
.week-day-header{padding:10px 16px 4px;display:flex;align-items:center;gap:8px}
.week-day-label{font-size:12px;font-weight:700;color:#1E293B}
.week-day-date{font-size:11px;color:#64748B}
.week-day-today .week-day-label{color:#1E3A5F}
.week-day-badge{background:#1E3A5F;color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700}
.meeting-card{margin:4px 16px;background:#fff;border:1px solid #E2E8F0;border-left:4px solid #6366F1;border-radius:10px;padding:10px 14px}
.meeting-title{font-size:14px;font-weight:600;color:#1E293B;margin-bottom:4px}
.meeting-meta{display:flex;flex-wrap:wrap;gap:4px}
.meeting-time{font-size:12px;color:#6366F1;font-weight:600}
.meeting-loc{font-size:12px;color:#64748B}
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 16px}
.date-nav-btn{background:#F1F5F9;border:none;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;color:#1E293B}
.date-nav-label{font-size:13px;font-weight:600;color:#1E293B}
.alarm-card{margin:4px 16px;background:#FFF7ED;border:1px solid #FED7AA;border-radius:10px;padding:10px 14px;display:flex;gap:10px;align-items:center}
.alarm-icon{font-size:20px}
.alarm-body{flex:1}
.alarm-title{font-size:13px;font-weight:600;color:#1E293B}
.alarm-time{font-size:12px;color:#C2410C;font-weight:500}
.sync-section{padding:16px}
.sync-card{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:12px;padding:14px;margin-bottom:12px}
.sync-card h3{font-size:14px;font-weight:700;color:#1E293B;margin-bottom:8px}
.sync-card p{font-size:13px;color:#64748B;line-height:1.5;margin-bottom:8px}
.sync-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.sync-btn.primary{background:#1E3A5F;color:#fff}
.sync-btn.primary:hover{background:#2D5986}
.sync-btn.danger{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
.sync-btn.success{background:#F0FDF4;color:#059669;border:1px solid #BBF7D0}
.sync-status{font-size:12px;color:#64748B;margin-top:6px}
.code-block{background:#1E293B;color:#E2E8F0;border-radius:8px;padding:12px;font-family:'Courier New',monospace;font-size:11px;overflow-x:auto;margin:8px 0;white-space:pre;line-height:1.5}
.copy-btn{background:#334155;color:#E2E8F0;border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;float:right;margin-bottom:4px}
.fab{position:fixed;bottom:80px;right:calc(50% - 240px + 16px);width:52px;height:52px;border-radius:50%;background:#1E3A5F;color:#fff;font-size:24px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(30,58,95,.4);display:flex;align-items:center;justify-content:center;z-index:100;transition:transform .2s}
.fab:hover{transform:scale(1.1)}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #E2E8F0;display:grid;grid-template-columns:repeat(4,1fr);z-index:99}
.nav-item{display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;font-size:9px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.3px;position:relative;border:none;background:none}
.nav-item.active{color:#1E3A5F}
.nav-item .nav-icon{font-size:20px;margin-bottom:2px}
.nav-dot{position:absolute;top:6px;right:calc(50% - 14px);width:7px;height:7px;border-radius:50%;background:#F87171;border:2px solid #fff}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:0 0 32px}
.modal-handle{width:40px;height:4px;background:#E2E8F0;border-radius:2px;margin:12px auto 0}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 12px}
.modal-title{font-size:18px;font-weight:700;color:#1E293B}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#94A3B8;line-height:1}
.form-group{padding:0 20px 12px}
.form-label{display:block;font-size:12px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.form-input{width:100%;padding:10px 12px;border:1px solid #E2E8F0;border-radius:10px;font-size:14px;color:#1E293B;outline:none;transition:border .2s;font-family:inherit}
.form-input:focus{border-color:#1E3A5F}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 12px}
.form-row .form-group{padding:0}
.chip-select{display:flex;flex-wrap:wrap;gap:6px}
.chip-opt{padding:5px 12px;border-radius:20px;border:1px solid #E2E8F0;background:#fff;font-size:12px;font-weight:500;color:#64748B;cursor:pointer}
.chip-opt.selected{background:#1E3A5F;color:#fff;border-color:#1E3A5F}
.form-actions{display:flex;gap:10px;padding:16px 20px 0;border-top:1px solid #F1F5F9}
.btn{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:#1E3A5F;color:#fff}
.btn-primary:hover{background:#2D5986}
.btn-secondary{background:#F1F5F9;color:#64748B}
.action-items{padding:0 20px 12px}
.ai-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F1F5F9}
.ai-check{width:16px;height:16px;border-radius:4px;border:1.5px solid #CBD5E1;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px}
.ai-check.done{background:#059669;border-color:#059669;color:#fff}
.ai-text{flex:1;font-size:13px;color:#1E293B}
.ai-del{background:none;border:none;color:#CBD5E1;cursor:pointer;font-size:16px}
.add-ai-row{display:flex;gap:8px;margin-top:6px}
.add-ai-input{flex:1;padding:7px 10px;border:1px dashed #CBD5E1;border-radius:8px;font-size:13px;outline:none}
.add-ai-btn{padding:7px 12px;background:#1E3A5F;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px}
.empty-state{text-align:center;padding:40px 20px;color:#94A3B8}
.empty-state .es-icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}
.progress-bar{height:4px;background:#E2E8F0;border-radius:2px;margin:4px 0}
.progress-fill{height:100%;border-radius:2px;background:#1E3A5F;transition:width .3s}
.project-deadline{background:#FFF7ED;border:1px solid #FED7AA;border-radius:8px;padding:6px 10px;margin-top:6px;font-size:11px;color:#C2410C;display:flex;align-items:center;gap:4px;font-weight:600}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>

<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════
// CONFIG — copy GCAL_CLIENT_ID from your existing index.html
// ═══════════════════════════════════════════════
const GCAL_CLIENT_ID = '859742900088-8d3lfkantkgcsp23m1o06u52c02o2a5q.apps.googleusercontent.com';
const GCAL_SCOPE     = 'https://www.googleapis.com/auth/calendar';
const GCAL_BASE      = 'https://www.googleapis.com/calendar/v3';
const STORAGE_KEY    = 'taskmaster_v8';
const TOKEN_KEY      = 'taskmaster_gcal_token';
const DELETED_KEY    = 'taskmaster_deleted';
const SNOOZED_KEY    = 'taskmaster_snoozed';

// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const PRIORITY = {
  high:   {label:'HIGH', color:'#DC2626', bg:'#FEF2F2', border:'#FECACA'},
  medium: {label:'MED',  color:'#D97706', bg:'#FFFBEB', border:'#FDE68A'},
  low:    {label:'LOW',  color:'#059669', bg:'#F0FDF4', border:'#BBF7D0'}
};

const ENERGY_TAGS = [
  {value:'deep_work',   label:'🧠 Deep Work',   color:'#7C3AED', bg:'#F5F3FF'},
  {value:'quick_admin', label:'⚡ Quick Admin',  color:'#D97706', bg:'#FFFBEB'},
  {value:'planning',    label:'📋 Planning',     color:'#1D4ED8', bg:'#EFF6FF'},
  {value:'client',      label:'🤝 Client',       color:'#059669', bg:'#F0FDF4'},
  {value:'site_visit',  label:'🏗 Site Visit',   color:'#DC2626', bg:'#FEF2F2'}
];

const PROJECT_STAGES = [
  {value:'survey',        label:'📐 Survey'},
  {value:'design',        label:'✏️ Design'},
  {value:'build',         label:'🔧 Panel Build'},
  {value:'fat',           label:'🔬 Testing/FAT'},
  {value:'installation',  label:'🏗 Installation'},
  {value:'commissioning', label:'⚡ Commissioning'},
  {value:'handover',      label:'✅ Handover'}
];

const ALARM_MINUTES = [5,10,15,30,60,120,1440];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let S = {
  items:        [],
  deleted:      [],
  snoozed:      [],
  meetings:     [],
  tab:          'tasks',
  energyFilter: 'all',
  projectFilter:'all',
  viewMode:     'today',   // today | week | project
  focusMode:    false,
  gcalToken:    null,
  gcalUser:     '',
  syncing:      false,
  modal:        null,      // null | 'task' | 'telegram'
  editItem:     null,
  showCompleted:false,
  meetingOffset:0,         // days offset for meetings view
  expandedProjects: {},
};

// ═══════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════
const fmt = d => {
  if (!d) return '';
  const dt = typeof d === 'string' ? new Date(d + (d.length===10?'T00:00:00':'')) : d;
  return `${dt.getDate()} ${MONTHS[dt.getMonth()]}`;
};
const fmtFull = d => {
  if (!d) return '';
  const dt = typeof d === 'string' ? new Date(d + 'T00:00:00') : d;
  return `${DAYS_SHORT[dt.getDay()]}, ${dt.getDate()} ${MONTHS[dt.getMonth()]} ${dt.getFullYear()}`;
};
const today = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const addDays = (dateStr, n) => {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const isOverdue = item => !item.done && item.dueDate && item.dueDate < today();
const isDueToday = item => !item.done && item.dueDate === today();
const durLabel = mins => {
  if (!mins) return '';
  return mins < 60 ? `${mins}m` : `${Math.round(mins/60*10)/10}h`;
};
const uid = () => 'user_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
const getGreeting = () => {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
};
const getWeekDates = () => {
  const t = today();
  const start = new Date(t + 'T00:00:00');
  const day = start.getDay();
  start.setDate(start.getDate() - day + (day === 0 ? -6 : 1)); // Monday
  return Array.from({length:7}, (_, i) => {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  });
};

const showToast = msg => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
};

// ═══════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════
const loadData = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      S.items = Array.isArray(parsed) ? parsed : (parsed.items || []);
    }
    S.deleted = JSON.parse(localStorage.getItem(DELETED_KEY) || '[]');
    S.snoozed = JSON.parse(localStorage.getItem(SNOOZED_KEY) || '[]');
    const tokenRaw = localStorage.getItem(TOKEN_KEY);
    if (tokenRaw) {
      const t = JSON.parse(tokenRaw);
      if (t && t.access_token) S.gcalToken = t;
    }
  } catch(e) { console.error('loadData:', e); }
};

const saveData = () => {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({items: S.items}));
    localStorage.setItem(DELETED_KEY, JSON.stringify(S.deleted));
  } catch(e) { console.error('saveData:', e); }
};

// ═══════════════════════════════════════════════
// COMPUTED
// ═══════════════════════════════════════════════
const getTasks = () => S.items.filter(i => i.type === 'task');
const getOverdueItems = () => getTasks().filter(isOverdue);
const getTodayItems  = () => getTasks().filter(isDueToday);
const getWeekItems   = () => {
  const week = getWeekDates();
  return getTasks().filter(i => !i.done && week.includes(i.dueDate));
};
const getProjects = () => {
  const ps = new Set(S.items.filter(i=>i.project).map(i=>i.project));
  return [...ps].sort();
};
const getAlarmingItems = () => {
  const now = new Date();
  const todayStr = today();
  return getTasks().filter(i => {
    if (i.done) return false;
    if (i.dueDate < todayStr) return true;
    if (i.dueDate === todayStr) return true;
    return false;
  });
};

const applyFilters = items => {
  let out = items;
  if (S.energyFilter !== 'all') out = out.filter(i => i.energyTag === S.energyFilter);
  if (S.projectFilter !== 'all') out = out.filter(i => (i.project||'') === S.projectFilter);
  return out;
};

// ═══════════════════════════════════════════════
// GCAL AUTH
// ═══════════════════════════════════════════════
let tokenClient = null;
const initGcal = () => {
  if (!window.google || !GCAL_CLIENT_ID || GCAL_CLIENT_ID === 'YOUR_GCAL_CLIENT_ID_HERE') return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GCAL_CLIENT_ID,
    scope: GCAL_SCOPE,
    callback: res => {
      if (res.error) { console.error(res); return; }
      S.gcalToken = res;
      S.gcalUser = S.gcalUser || '';
      localStorage.setItem(TOKEN_KEY, JSON.stringify(res));
      render();
      syncFromGcal();
    }
  });
};

const gcalAuth = () => {
  if (!tokenClient) { showToast('⚠️ GCal not configured'); return; }
  tokenClient.requestAccessToken({prompt:''});
};

const gcalFetch = async (path, opts={}) => {
  if (!S.gcalToken) throw new Error('Not authenticated');
  const res = await fetch(GCAL_BASE + path, {
    ...opts,
    headers: {
      'Authorization': 'Bearer ' + S.gcalToken.access_token,
      'Content-Type': 'application/json',
      ...(opts.headers||{})
    }
  });
  if (res.status === 401) { S.gcalToken = null; localStorage.removeItem(TOKEN_KEY); render(); throw new Error('Token expired'); }
  if (!res.ok) throw new Error(await res.text());
  return res.status === 204 ? null : res.json();
};

// ═══════════════════════════════════════════════
// GCAL SYNC — fetch next 14 days only (fixes freeze)
// ═══════════════════════════════════════════════
const gcalEventToItem = ev => {
  const start = ev.start?.dateTime || ev.start?.date || '';
  const end   = ev.end?.dateTime   || ev.end?.date   || '';
  const isAllDay = !ev.start?.dateTime;
  const item = {
    id:           'gcal_' + ev.id,
    gcalId:       ev.id,
    type:         'appointment',
    category:     'work',
    title:        ev.summary || '(no title)',
    dueDate:      start.slice(0,10),
    startTime:    isAllDay ? '' : start.slice(11,16),
    endTime:      isAllDay ? '' : end.slice(11,16),
    dueTime:      isAllDay ? '' : start.slice(11,16),
    location:     ev.location || '',
    notes:        ev.description || '',
    priority:     'medium',
    recurrence:   'none',
    estimatedMins:0,
    done:         false,
    deferred:     false,
    fromGcal:     true,
    synced:       true,
    createdAt:    ev.created || new Date().toISOString(),
    actionItems:  [],
    project:      '',
    assignee:     '',
    energyTag:    '',
    projectStage: ''
  };
  return item;
};

const syncFromGcal = async () => {
  if (!S.gcalToken) return;
  S.syncing = true; render();
  try {
    const timeMin = new Date().toISOString();
    const tMax = new Date(); tMax.setDate(tMax.getDate() + 14);
    const timeMax = tMax.toISOString();
    const params = new URLSearchParams({
      calendarId: 'primary', singleEvents: 'true',
      orderBy: 'startTime', timeMin, timeMax, maxResults: '100'
    });
    const data = await gcalFetch('/calendars/primary/events?' + params);
    const events = data.items || [];
    // Update meetings list
    S.meetings = events.map(gcalEventToItem);
    // Sync tasks: preserve user tasks, merge gcal appointments
    const gcalIds = new Set(events.map(e => e.id));
    const deletedGcalIds = new Set(S.deleted);
    // Remove old gcal items not in range anymore (keep user tasks)
    S.items = S.items.filter(i => {
      if (!i.fromGcal) return true; // keep user tasks
      if (deletedGcalIds.has(i.gcalId)) return false;
      return true; // keep existing gcal items outside range too
    });
    // Upsert events from gcal
    events.forEach(ev => {
      if (deletedGcalIds.has(ev.id)) return;
      const existIdx = S.items.findIndex(i => i.gcalId === ev.id);
      const newItem = gcalEventToItem(ev);
      if (existIdx >= 0) {
        // Preserve user-edited fields
        const existing = S.items[existIdx];
        S.items[existIdx] = {
          ...newItem,
          project:      existing.project      || newItem.project,
          assignee:     existing.assignee     || newItem.assignee,
          energyTag:    existing.energyTag    || newItem.energyTag,
          projectStage: existing.projectStage || newItem.projectStage,
          priority:     existing.priority     || newItem.priority,
          notes:        existing.notes        || newItem.notes,
          done:         existing.done,
          actionItems:  existing.actionItems  || []
        };
      } else {
        S.items.push(newItem);
      }
    });
    saveData();
    S.syncing = false; render();
    showToast('✅ Synced with Google Calendar');
  } catch(e) {
    S.syncing = false; render();
    showToast('⚠️ Sync error: ' + e.message);
  }
};

const gcalCreateEvent = async item => {
  if (!S.gcalToken) return null;
  const body = {
    summary: item.title,
    description: item.notes || '',
    location: item.location || '',
    start: item.startTime
      ? {dateTime: item.dueDate + 'T' + (item.startTime||'09:00') + ':00', timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone}
      : {date: item.dueDate},
    end: item.endTime
      ? {dateTime: item.dueDate + 'T' + (item.endTime||'10:00') + ':00', timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone}
      : {date: item.dueDate}
  };
  const res = await gcalFetch('/calendars/primary/events', {method:'POST', body:JSON.stringify(body)});
  return res;
};

const gcalUpdateEvent = async item => {
  if (!S.gcalToken || !item.gcalId) return;
  const body = {
    summary: item.title,
    description: item.notes || '',
    location: item.location || '',
    start: item.startTime
      ? {dateTime: item.dueDate + 'T' + (item.startTime||'09:00') + ':00', timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone}
      : {date: item.dueDate},
    end: item.endTime
      ? {dateTime: item.dueDate + 'T' + (item.endTime||'10:00') + ':00', timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone}
      : {date: item.dueDate}
  };
  await gcalFetch('/calendars/primary/events/' + item.gcalId, {method:'PATCH', body:JSON.stringify(body)});
};

const gcalDeleteEvent = async gcalId => {
  if (!S.gcalToken || !gcalId) return;
  await gcalFetch('/calendars/primary/events/' + gcalId, {method:'DELETE'});
};

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════
const toggleDone = id => {
  const item = S.items.find(i => i.id === id);
  if (!item) return;
  item.done = !item.done;
  saveData();
  if (item.gcalId && item.done) gcalDeleteEvent(item.gcalId).catch(()=>{});
  render();
  showToast(item.done ? '✅ Completed!' : '↩️ Reopened');
};

const deleteItem = id => {
  const item = S.items.find(i => i.id === id);
  if (!item) return;
  if (!confirm(`Delete "${item.title}"?`)) return;
  S.items = S.items.filter(i => i.id !== id);
  if (item.gcalId) {
    S.deleted.push(item.gcalId);
    gcalDeleteEvent(item.gcalId).catch(()=>{});
  }
  saveData();
  render();
  showToast('🗑 Deleted');
};

const openEditModal = id => {
  S.editItem = id ? JSON.parse(JSON.stringify(S.items.find(i=>i.id===id))) : {
    id: uid(), type:'task', category:'work', title:'', priority:'high',
    dueDate: today(), dueTime:'', startTime:'', endTime:'', notes:'',
    location:'', estimatedMins:60, recurrence:'none', done:false,
    deferred:false, fromGcal:false, synced:false, gcalId:'',
    createdAt: new Date().toISOString(), actionItems:[],
    project:'', assignee:'', energyTag:'', projectStage:''
  };
  S.modal = 'task';
  render();
};

const saveItem = async () => {
  const item = S.editItem;
  if (!item || !item.title.trim()) { showToast('⚠️ Title is required'); return; }
  const idx = S.items.findIndex(i => i.id === item.id);
  const isNew = idx < 0;
  if (isNew) { S.items.push(item); } else { S.items[idx] = item; }
  saveData();
  S.modal = null; S.editItem = null;
  render();
  // Sync to GCal
  if (S.gcalToken && item.dueDate) {
    try {
      if (isNew || !item.gcalId) {
        const ev = await gcalCreateEvent(item);
        if (ev) { item.gcalId = ev.id; item.synced = true; saveData(); }
      } else {
        await gcalUpdateEvent(item);
      }
      showToast('✅ Saved & synced');
    } catch(e) { showToast('💾 Saved (GCal error: ' + e.message + ')'); }
  } else { showToast('💾 Saved locally'); }
};

const toggleAI = (itemId, aiId) => {
  const item = S.editItem && S.editItem.id === itemId ? S.editItem : S.items.find(i=>i.id===itemId);
  if (!item) return;
  const ai = item.actionItems.find(a => a.id === aiId);
  if (ai) { ai.done = !ai.done; saveData(); render(); }
};

const addActionItem = text => {
  if (!S.editItem || !text.trim()) return;
  S.editItem.actionItems.push({id:'ai_'+Date.now(), text:text.trim(), done:false, createdAt:new Date().toISOString()});
  render();
};

const removeActionItem = aiId => {
  if (!S.editItem) return;
  S.editItem.actionItems = S.editItem.actionItems.filter(a => a.id !== aiId);
  render();
};

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const renderTaskCard = item => {
  const p = PRIORITY[item.priority] || PRIORITY.medium;
  const od = isOverdue(item);
  const et = ENERGY_TAGS.find(t => t.value === item.energyTag);
  const ps = PROJECT_STAGES.find(s => s.value === item.projectStage);
  const doneChk = item.done ? '✓' : '';
  const aiDone = item.actionItems.filter(a=>a.done).length;
  const aiTotal = item.actionItems.length;

  return `<div class="task-card ${item.done?'done':''}" data-id="${item.id}">
    <div class="task-check ${item.done?'checked':''}" onclick="toggleDone('${item.id}')">${doneChk}</div>
    <div class="task-body">
      <div class="task-title ${item.done?'done':''}">${esc(item.title)}</div>
      <div class="task-meta">
        ${item.dueDate ? `<span class="meta-chip meta-date ${od?'overdue':''}">${fmt(item.dueDate)}${item.dueTime?' '+item.dueTime:''}</span>` : ''}
        <span class="meta-chip meta-priority" style="background:${p.color}">${p.label}</span>
        ${item.estimatedMins ? `<span class="meta-chip meta-date">⏱ ${durLabel(item.estimatedMins)}</span>` : ''}
        ${item.gcalId ? '<span class="meta-chip meta-gcal">GCal</span>' : ''}
        ${item.project ? `<span class="meta-chip meta-project">📁 ${esc(item.project)}</span>` : ''}
        ${item.assignee ? `<span class="meta-chip meta-assignee">👤 ${esc(item.assignee)}</span>` : ''}
        ${et ? `<span class="meta-chip meta-energy" style="background:${et.bg};color:${et.color}">${et.label}</span>` : ''}
        ${ps ? `<span class="meta-chip meta-stage">${ps.label}</span>` : ''}
      </div>
      ${aiTotal > 0 ? `<div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${Math.round(aiDone/aiTotal*100)}%"></div></div>
      <div style="font-size:10px;color:#94A3B8;margin-top:2px">${aiDone}/${aiTotal} action items</div>` : ''}
    </div>
    <div class="task-actions">
      <button class="icon-btn" onclick="openEditModal('${item.id}')" title="Edit">✏️</button>
      <button class="icon-btn" onclick="deleteItem('${item.id}')" title="Delete">🗑</button>
    </div>
  </div>`;
};

const renderTasksTab = () => {
  const overdue = applyFilters(getOverdueItems());
  const todayItems = applyFilters(getTodayItems());
  const weekItems = applyFilters(getWeekItems());
  const weekDates = getWeekDates();
  const projects = getProjects();
  const completed = applyFilters(getTasks().filter(i=>i.done));
  const allTasks = applyFilters(getTasks().filter(i=>!i.done));

  const viewToggle = `
    <div class="view-toggles">
      <button class="view-btn ${S.viewMode==='today'?'active':''}" onclick="setView('today')">📅 Today</button>
      <button class="view-btn ${S.viewMode==='week'?'active':''}" onclick="setView('week')">🗓 This Week</button>
      <button class="view-btn ${S.viewMode==='project'?'active':''}" onclick="setView('project')">📁 By Project</button>
    </div>`;

  const energyFilters = `
    <div class="filter-row">
      <span class="filter-pill ${S.energyFilter==='all'?'active':''}" onclick="setEnergyFilter('all')">All</span>
      ${ENERGY_TAGS.map(t => `<span class="filter-pill ${S.energyFilter===t.value?'active':''}" onclick="setEnergyFilter('${t.value}')" style="${S.energyFilter===t.value?'':'border-color:'+t.color+';color:'+t.color}">${t.label}</span>`).join('')}
    </div>`;

  let content = '';

  // OVERDUE BANNER — only show warning, never "enjoy" if overdue
  const allOverdue = getOverdueItems();
  if (allOverdue.length > 0) {
    content += `<div class="overdue-banner">⚠️ ${allOverdue.length} overdue task${allOverdue.length>1?'s':''} need attention</div>`;
  }

  if (S.viewMode === 'today') {
    if (overdue.length > 0) {
      content += `<div class="section-header danger">⚠ Overdue · ${overdue.length}</div>`;
      content += overdue.map(renderTaskCard).join('');
    }
    content += `<div class="section-header">${DAYS_SHORT[new Date().getDay()]} · Today</div>`;
    if (todayItems.length === 0 && overdue.length === 0) {
      content += `<div class="empty-state"><div class="es-icon">🎉</div><p>No tasks today — enjoy!</p></div>`;
    } else if (todayItems.length === 0) {
      content += `<div class="empty-state" style="padding:16px"><p style="font-size:13px;color:#94A3B8">No tasks scheduled for today.</p></div>`;
    } else {
      content += todayItems.map(renderTaskCard).join('');
    }
    content += `<div class="add-task-row" onclick="openEditModal(null)"><span>＋</span> Add task...</div>`;

  } else if (S.viewMode === 'week') {
    if (overdue.length > 0) {
      content += `<div class="section-header danger">⚠ Overdue · ${overdue.length}</div>`;
      content += overdue.map(renderTaskCard).join('');
    }
    const todayStr = today();
    weekDates.forEach(d => {
      const dayTasks = applyFilters(getTasks().filter(i => !i.done && i.dueDate === d));
      const dt = new Date(d + 'T00:00:00');
      const isToday = d === todayStr;
      content += `<div class="week-day-header ${isToday?'week-day-today':''}">
        <span class="week-day-label">${DAYS_SHORT[dt.getDay()]}</span>
        <span class="week-day-date">${dt.getDate()} ${MONTHS[dt.getMonth()]}</span>
        ${isToday ? '<span class="week-day-badge">TODAY</span>' : ''}
      </div>`;
      if (dayTasks.length === 0) {
        content += `<div style="padding:4px 16px 8px;font-size:12px;color:#CBD5E1">No tasks</div>`;
      } else {
        content += dayTasks.map(renderTaskCard).join('');
      }
    });
    content += `<div class="add-task-row" onclick="openEditModal(null)"><span>＋</span> Add task...</div>`;

  } else if (S.viewMode === 'project') {
    if (overdue.length > 0) {
      content += `<div class="section-header danger">⚠ Overdue · ${overdue.length}</div>`;
      content += overdue.map(renderTaskCard).join('');
    }
    const unassigned = applyFilters(getTasks().filter(i => !i.done && !i.project));
    if (projects.length === 0 && unassigned.length === 0) {
      content += `<div class="empty-state"><div class="es-icon">📁</div><p>No projects yet.<br>Add a Project name when creating tasks.</p></div>`;
    }
    projects.forEach(proj => {
      const projTasks = applyFilters(getTasks().filter(i => !i.done && i.project === proj));
      const projDone = applyFilters(getTasks().filter(i => i.done && i.project === proj));
      const expanded = S.expandedProjects[proj] !== false;
      content += `<div class="project-group">
        <div class="project-group-header" onclick="toggleProject('${esc(proj)}')">
          <div>
            <div class="project-group-title">📁 ${esc(proj)}</div>
            <div class="project-group-meta">${projTasks.length} pending · ${projDone.length} done</div>
          </div>
          <span>${expanded?'▲':'▼'}</span>
        </div>
        ${expanded ? `<div class="project-group-tasks">${projTasks.length>0 ? projTasks.map(renderTaskCard).join('') : '<div style="padding:10px 14px;font-size:13px;color:#94A3B8">All tasks done ✓</div>'}</div>` : ''}
      </div>`;
    });
    if (unassigned.length > 0) {
      content += `<div class="section-header">📋 Unassigned</div>`;
      content += unassigned.map(renderTaskCard).join('');
    }
    content += `<div class="add-task-row" onclick="openEditModal(null)"><span>＋</span> Add task...</div>`;
  }

  // Completed section
  if (completed.length > 0) {
    content += `<div class="completed-toggle" onclick="toggleCompleted()">
      Completed (${completed.length}) <span>${S.showCompleted?'▲':'▼'}</span>
    </div>`;
    if (S.showCompleted) content += completed.map(renderTaskCard).join('');
  }

  return viewToggle + energyFilters + content;
};

const renderMeetingsTab = () => {
  const baseDate = addDays(today(), S.meetingOffset * 7);
  const endDate  = addDays(baseDate, 6);
  const range = `${fmt(baseDate)} – ${fmt(endDate)}`;

  const periodMeetings = S.meetings.filter(m => m.dueDate >= baseDate && m.dueDate <= endDate);
  const byDay = {};
  periodMeetings.forEach(m => {
    if (!byDay[m.dueDate]) byDay[m.dueDate] = [];
    byDay[m.dueDate].push(m);
  });
  const sortedDays = Object.keys(byDay).sort();

  let html = `<div class="date-nav">
    <button class="date-nav-btn" onclick="shiftMeetings(-1)">← Prev</button>
    <span class="date-nav-label">📅 ${range}</span>
    <button class="date-nav-btn" onclick="shiftMeetings(1)">Next →</button>
  </div>`;

  if (!S.gcalToken) {
    html += `<div class="empty-state"><div class="es-icon">🔗</div><p>Connect Google Calendar<br>to see your meetings.</p>
    <button class="sync-btn primary" style="margin-top:12px" onclick="gcalAuth()">Connect GCal</button></div>`;
    return html;
  }

  if (S.syncing) {
    html += `<div class="empty-state"><div class="es-icon">🔄</div><p>Loading meetings...</p></div>`;
    return html;
  }

  if (sortedDays.length === 0) {
    html += `<div class="empty-state"><div class="es-icon">🗓</div><p>No meetings this week.</p></div>`;
    return html;
  }

  sortedDays.forEach(d => {
    const dt = new Date(d + 'T00:00:00');
    const isToday = d === today();
    html += `<div class="week-day-header ${isToday?'week-day-today':''}">
      <span class="week-day-label">${DAYS_SHORT[dt.getDay()]}</span>
      <span class="week-day-date">${dt.getDate()} ${MONTHS[dt.getMonth()]}</span>
      ${isToday ? '<span class="week-day-badge">TODAY</span>' : ''}
    </div>`;
    byDay[d].sort((a,b) => (a.startTime||'').localeCompare(b.startTime||'')).forEach(m => {
      html += `<div class="meeting-card">
        <div class="meeting-title">${esc(m.title)}</div>
        <div class="meeting-meta">
          ${m.startTime ? `<span class="meeting-time">🕐 ${m.startTime}${m.endTime?' – '+m.endTime:''}</span>` : '<span class="meeting-time">All day</span>'}
          ${m.location ? `<span class="meeting-loc">📍 ${esc(m.location)}</span>` : ''}
        </div>
        <button class="sync-btn success" style="margin-top:8px;padding:4px 10px;font-size:11px" onclick="meetingToTask('${m.id}')">+ Add Follow-up Task</button>
      </div>`;
    });
  });

  return html;
};

const renderProjectsTab = () => {
  const projects = getProjects();
  if (projects.length === 0) {
    return `<div class="empty-state"><div class="es-icon">🏗</div>
      <p>No projects yet.<br>Set a <strong>Project</strong> field when creating tasks to track them here.</p>
      <button class="sync-btn primary" style="margin-top:16px" onclick="openEditModal(null)">+ New Task with Project</button>
    </div>`;
  }

  return projects.map(proj => {
    const allProjTasks = getTasks().filter(i => i.project === proj);
    const pending = allProjTasks.filter(i => !i.done);
    const done    = allProjTasks.filter(i => i.done);
    const pct     = allProjTasks.length ? Math.round(done.length/allProjTasks.length*100) : 0;
    const stages  = [...new Set(allProjTasks.filter(i=>i.projectStage).map(i=>i.projectStage))];
    const nearestDeadline = pending.filter(i=>i.dueDate).sort((a,b)=>a.dueDate.localeCompare(b.dueDate))[0];
    const daysLeft = nearestDeadline ? Math.ceil((new Date(nearestDeadline.dueDate+'T00:00:00') - new Date()) / 86400000) : null;

    return `<div class="project-group" style="margin:8px 16px 0">
      <div class="project-group-header" onclick="toggleProject('${esc(proj)}')">
        <div>
          <div class="project-group-title">📁 ${esc(proj)}</div>
          <div class="project-group-meta">${pending.length} pending · ${done.length} done · ${pct}% complete</div>
          ${daysLeft !== null ? `<div class="project-deadline">⏰ ${daysLeft < 0 ? Math.abs(daysLeft)+' days overdue!' : daysLeft === 0 ? 'Due today!' : daysLeft+' days to next deadline'}</div>` : ''}
          ${stages.length ? `<div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">${stages.map(s=>{const st=PROJECT_STAGES.find(x=>x.value===s);return st?`<span class="meta-chip meta-stage" style="font-size:10px">${st.label}</span>`:''}).join('')}</div>` : ''}
        </div>
        <span>${S.expandedProjects[proj]!==false?'▲':'▼'}</span>
      </div>
      <div class="progress-bar" style="margin:0 14px 8px"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${S.expandedProjects[proj]!==false ? `<div class="project-group-tasks">
        ${pending.length>0 ? pending.map(renderTaskCard).join('') : '<div style="padding:10px 14px;font-size:13px;color:#94A3B8">All tasks done ✓</div>'}
      </div>` : ''}
    </div>`;
  }).join('');
};

const renderSyncTab = () => {
  const isConnected = !!S.gcalToken;
  const configured = GCAL_CLIENT_ID !== 'YOUR_GCAL_CLIENT_ID_HERE';

  const telegramScript = `// ═══ Telegram Bot via Google Apps Script ═══
// 1. Go to script.google.com → New project
// 2. Paste this code, fill in BOT_TOKEN
// 3. Deploy → Web app → Anyone
// 4. Set webhook: https://api.telegram.org/bot{TOKEN}/setWebhook?url={WEB_APP_URL}

const BOT_TOKEN = 'YOUR_TELEGRAM_BOT_TOKEN';
const CALENDAR_ID = 'primary';

function doPost(e) {
  const update = JSON.parse(e.postData.contents);
  const msg = update.message;
  if (!msg || !msg.text) return ok();

  const text = msg.text.trim();
  const chatId = msg.chat.id;

  // Ignore bot commands except /start
  if (text === '/start') {
    reply(chatId, '👋 Hi! Send me a task like:\\n' +
      '"Review panel drawings by Friday"\\n' +
      '"Meeting ABC client tomorrow 2pm"\\n' +
      '"High: Submit tender by 25 Jun"');
    return ok();
  }

  const task = parseTask(text);
  createCalendarEvent(task);
  reply(chatId, '✅ Added: ' + task.title +
    (task.date ? '\\n📅 ' + task.date : '') +
    (task.priority !== 'medium' ? '\\n🔺 ' + task.priority.toUpperCase() : ''));
  return ok();
}

function parseTask(text) {
  let title = text, priority = 'medium', date = '';

  // Priority prefix: "High: title" or "Urgent: title"
  const priMatch = text.match(/^(high|urgent|low|med|medium):\\s*/i);
  if (priMatch) {
    priority = priMatch[1].toLowerCase().replace('urgent','high').replace('med','medium');
    title = text.replace(priMatch[0], '').trim();
  }

  // Date extraction
  const today = new Date();
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
  const fmt = d => d.toISOString().slice(0,10);

  if (/\\btoday\\b/i.test(title)) { date = fmt(today); title = title.replace(/\\btoday\\b/i,'').trim(); }
  else if (/\\btomorrow\\b/i.test(title)) { date = fmt(tomorrow); title = title.replace(/\\btomorrow\\b/i,'').trim(); }
  else {
    const byMatch = title.match(/\\bby\\s+(\\w+\\s+\\d+|\\w+day|\\d+\\s+\\w+)/i);
    if (byMatch) {
      const d = new Date(byMatch[1] + ' ' + today.getFullYear());
      if (!isNaN(d)) { date = fmt(d); title = title.replace(byMatch[0],'').trim(); }
    }
  }

  // Time extraction
  let startTime = '';
  const timeMatch = title.match(/\\b(\\d{1,2}(?::\\d{2})?\\s*(?:am|pm))\\b/i);
  if (timeMatch) {
    const tp = timeMatch[1].toLowerCase();
    let [h,m] = tp.replace(/(am|pm)/,'').split(':').map(Number);
    if (tp.includes('pm') && h !== 12) h += 12;
    if (tp.includes('am') && h === 12) h = 0;
    startTime = String(h).padStart(2,'0')+':'+(m?String(m).padStart(2,'0'):'00');
    title = title.replace(timeMatch[0],'').trim();
  }

  title = title.replace(/\\s+/g,' ').replace(/[,.]$/,'').trim();
  if (!date) date = fmt(today);

  return { title, priority, date, startTime };
}

function createCalendarEvent(task) {
  const cal = CalendarApp.getCalendarById(CALENDAR_ID) || CalendarApp.getDefaultCalendar();
  const d = new Date(task.date + 'T' + (task.startTime || '09:00') + ':00');
  const end = new Date(d.getTime() + 3600000);
  const ev = cal.createEvent('[Task] ' + task.title, d, end);
  ev.setDescription('Priority: ' + task.priority.toUpperCase() + '\\nCreated via Telegram bot');
}

function reply(chatId, text) {
  const url = 'https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage';
  UrlFetchApp.fetch(url, {
    method: 'post',
    contentType: 'application/json',
    payload: JSON.stringify({ chat_id: chatId, text })
  });
}

function ok() { return ContentService.createTextOutput('ok'); }`;

  return `<div class="sync-section">
    <div class="sync-card">
      <h3>🔗 Google Calendar</h3>
      ${!configured ? '<p style="color:#DC2626;font-weight:600">⚠️ Set your GCAL_CLIENT_ID in the source code first.</p>' : ''}
      <p>Status: ${isConnected ? '<strong style="color:#059669">✅ Connected</strong>' : '<strong style="color:#DC2626">❌ Not connected</strong>'}</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
        <button class="sync-btn primary" onclick="${isConnected ? 'syncFromGcal()' : 'gcalAuth()'}">
          ${S.syncing ? '<span class="spinner"></span> Syncing...' : isConnected ? '🔄 Sync Now' : '🔗 Connect'}
        </button>
        ${isConnected ? '<button class="sync-btn danger" onclick="disconnectGcal()">Disconnect</button>' : ''}
      </div>
      <p class="sync-status">${S.items.filter(i=>i.fromGcal).length} GCal events · ${getTasks().filter(i=>!i.fromGcal).length} local tasks</p>
    </div>

    <div class="sync-card">
      <h3>💬 Telegram Bot (Free Setup)</h3>
      <p>Type tasks in Telegram and they appear in your calendar automatically. Uses Google Apps Script — no paid server needed.</p>
      <p style="margin-top:4px"><strong>Setup steps:</strong></p>
      <p>1. Message <strong>@BotFather</strong> on Telegram → /newbot → copy your token</p>
      <p>2. Open <a href="https://script.google.com" target="_blank" style="color:#1D4ED8">script.google.com</a> → New project</p>
      <p>3. Paste the script below, replace <code>YOUR_TELEGRAM_BOT_TOKEN</code></p>
      <p>4. Deploy → Web app → Execute as: Me, Access: Anyone</p>
      <p>5. Copy the web app URL and run this once in your browser:</p>
      <p style="font-size:12px;background:#F1F5F9;padding:8px;border-radius:6px;margin:6px 0;word-break:break-all">https://api.telegram.org/bot<strong>YOUR_TOKEN</strong>/setWebhook?url=<strong>YOUR_WEBAPP_URL</strong></p>
      <p>6. Message your bot: <em>"High: Review switchboard drawings by Friday"</em></p>
      <button class="copy-btn" onclick="copyScript()" style="float:none;margin-bottom:6px;display:block">📋 Copy Script</button>
      <div class="code-block" id="tg-script" style="max-height:200px">${esc(telegramScript)}</div>
    </div>

    <div class="sync-card">
      <h3>📊 Data</h3>
      <p>All your tasks are stored locally in your browser. Export or clear below.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
        <button class="sync-btn success" onclick="exportData()">⬇️ Export JSON</button>
        <button class="sync-btn danger" onclick="clearData()">🗑 Clear All Data</button>
      </div>
    </div>
  </div>`;
};

// ═══════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════
const render = () => {
  const overdue = getOverdueItems();
  const alarms  = getAlarmingItems();
  const todayStr = today();
  const now = new Date();
  const hr = now.getHours();
  const emoji = hr < 12 ? '🌅' : hr < 17 ? '☀️' : '🌙';

  const tabs = [
    {id:'tasks',    icon:'✅', label:'Tasks'},
    {id:'meetings', icon:'📅', label:'Meetings'},
    {id:'projects', icon:'📁', label:'Projects'},
    {id:'sync',     icon:'🔗', label:'Sync'}
  ];

  let tabContent = '';
  if (S.tab === 'tasks')    tabContent = renderTasksTab();
  else if (S.tab === 'meetings') tabContent = renderMeetingsTab();
  else if (S.tab === 'projects') tabContent = renderProjectsTab();
  else if (S.tab === 'alarms')   tabContent = renderAlarmsTab();
  else if (S.tab === 'sync')     tabContent = renderSyncTab();

  const html = `
    <div class="header">
      <div class="header-top">
        <div>
          <div class="greeting">${getGreeting()}, ${S.gcalUser ? S.gcalUser.split('@')[0].replace(/\./g,' ') : 'Ye Win'} ${emoji}</div>
          <div class="app-title">TaskMaster Pro</div>
          <div class="header-meta">${S.gcalUser || 'yewinhtut.sunlight@gmail.com'} · SGT</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <div class="badge gcal-live" onclick="${S.gcalToken ? 'syncFromGcal()' : 'gcalAuth()'}">
            ${S.syncing ? '<span class="spinner"></span>' : (S.gcalToken ? '✅' : '⬜')} GCal ${S.gcalToken ? 'Live' : 'Off'}
          </div>
          <div class="badge ${S.focusMode?'active':''}" onclick="toggleFocus()">🎯 Focus${S.focusMode?' On':''}</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-num">${getTodayItems().length}</div><div class="stat-label">Today</div></div>
        <div class="stat"><div class="stat-num ${overdue.length>0?'danger':''}">${overdue.length}</div><div class="stat-label">Overdue</div></div>
        <div class="stat"><div class="stat-num">${S.meetings.length}</div><div class="stat-label">Upcoming</div></div>
        <div class="stat"><div class="stat-num ${alarms.length>0?'warn':''}">${alarms.length}</div><div class="stat-label">Alerts</div></div>
      </div>
      <div class="tabs">
        ${tabs.map(t => `<button class="tab-btn ${S.tab===t.id?'active':''}" onclick="setTab('${t.id}')">
          ${t.icon} ${t.label}${t.id==='alarms'&&alarms.length>0?'<span class="dot"></span>':''}
        </button>`).join('')}
      </div>
    </div>
    <div class="content">${tabContent}</div>
    <button class="fab" onclick="openEditModal(null)" title="New Task">＋</button>
    <nav class="bottom-nav">
      ${tabs.map(t => `<button class="nav-item ${S.tab===t.id?'active':''}" onclick="setTab('${t.id}')">
        <span class="nav-icon">${t.icon}</span>${t.label}
        ${t.id==='sync'&&alarms.length>0?`<span class="nav-dot"></span>`:''}
      </button>`).join('')}
    </nav>
    ${renderModal()}
  `;

  document.getElementById('app').innerHTML = html;
};

// ═══════════════════════════════════════════════
// EVENT HANDLERS (called from HTML)
// ═══════════════════════════════════════════════
const setTab = t => { S.tab = t; render(); };
const setView = v => { S.viewMode = v; render(); };
const setEnergyFilter = f => { S.energyFilter = f; render(); };
const toggleFocus = () => { S.focusMode = !S.focusMode; render(); };
const toggleCompleted = () => { S.showCompleted = !S.showCompleted; render(); };
const shiftMeetings = n => { S.meetingOffset += n; render(); };
const toggleProject = name => {
  S.expandedProjects[name] = S.expandedProjects[name] === false ? true : false;
  render();
};
const closeModal = () => { S.modal = null; S.editItem = null; render(); };
const closeModalIfBg = e => { if (e.target.classList.contains('modal-overlay')) closeModal(); };
const updateEdit = (key, val) => { if (S.editItem) { S.editItem[key] = val; render(); } };
const disconnectGcal = () => {
  if (!confirm('Disconnect Google Calendar?')) return;
  S.gcalToken = null; S.meetings = [];
  localStorage.removeItem(TOKEN_KEY);
  render(); showToast('Disconnected from GCal');
};
const meetingToTask = meetingId => {
  const m = S.meetings.find(i => i.id === meetingId);
  if (!m) return;
  openEditModal(null);
  if (S.editItem) {
    S.editItem.title = 'Follow-up: ' + m.title;
    S.editItem.dueDate = m.dueDate;
    S.editItem.type = 'task';
    S.editItem.energyTag = 'client';
    render();
  }
};
const copyScript = () => {
  const txt = document.getElementById('tg-script');
  if (!txt) return;
  navigator.clipboard.writeText(txt.innerText).then(() => showToast('📋 Script copied!')).catch(() => showToast('Select text and copy manually'));
};
const exportData = () => {
  const blob = new Blob([JSON.stringify({items:S.items}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'taskmaster_backup_' + today() + '.json';
  a.click();
  showToast('⬇️ Exported!');
};
const clearData = () => {
  if (!confirm('Clear ALL data? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(DELETED_KEY);
  S.items = []; S.deleted = [];
  saveData(); render(); showToast('🗑 Cleared');
};

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
window.addEventListener('load', () => {
  loadData();
  render();
  // Init GCal after google identity services loads
  const waitForGoogle = setInterval(() => {
    if (window.google && window.google.accounts) {
      clearInterval(waitForGoogle);
      initGcal();
      // Auto-sync if already have token
      if (S.gcalToken) syncFromGcal();
    }
  }, 200);
  // Register service worker for PWA (optional)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
});
