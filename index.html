// ─── GOOGLE CALENDAR API HELPERS ──────────────────────────────────────────────
async function gcalFetch(token, path, method="GET", body=null, retries=2) {
  const opts = { method, headers:{ Authorization:"Bearer "+token, "Content-Type":"application/json" } };
  if(body) opts.body = JSON.stringify(body);
  for(let attempt=0; attempt<=retries; attempt++) {
    try {
      const res = await fetch(GCAL_BASE+path, opts);
      if(!res.ok) {
        const errData = await res.json().catch(()=>({}));
        throw new Error("GCal API error "+res.status+": "+(errData.error?.message||res.statusText));
      }
      if(res.status===204) return null;
      return res.json();
    } catch(e) {
      if(attempt===retries) throw e;
      await new Promise(r=>setTimeout(r, 1000));
    }
  }
}

async function gcalListEvents(token) {
  const now = new Date(); now.setDate(now.getDate()-7);
  const end = new Date(); end.setMonth(end.getMonth()+3);
  const params = new URLSearchParams({
    timeMin:now.toISOString(), timeMax:end.toISOString(),
    singleEvents:"true", orderBy:"startTime", maxResults:"500"
  });
  const data = await gcalFetch(token, "/calendars/primary/events?"+params);
  return (data.items||[]).filter(e=>e.status!=="cancelled");
}

async function gcalCreateEvent(token, item) {
  const isApt = item.type==="appointment";
  // MEETINGS: timed events. TASKS: always all-day (no time block in calendar)
  let body;
  if(isApt && item.startTime && item.endTime) {
    body = {
      summary: item.title,
      description: item.notes||"",
      ...(item.location ? {location:item.location} : {}),
      start:{ dateTime:`${item.dueDate}T${item.startTime}:00+08:00`, timeZone:"Asia/Singapore" },
      end:  { dateTime:`${item.dueDate}T${item.endTime}:00+08:00`,   timeZone:"Asia/Singapore" },
      reminders:{ useDefault:false, overrides:[{ method:"popup", minutes:30 }] },
      extendedProperties:{ private:{ taskmaster_id:String(item.id), taskmaster_type:"meeting" } }
    };
  } else {
    // Task → all-day event with priority and time in description
    const timeNote = item.dueTime ? `Scheduled: ${item.dueTime} SGT` : "";
    const estNote = item.estimatedMins ? `Est: ${item.estimatedMins<60?item.estimatedMins+"m":Math.floor(item.estimatedMins/60)+"h"}` : "";
    const desc = [
      `[Task] ${item.priority?.toUpperCase()||"MEDIUM"} priority`,
      timeNote, estNote, item.notes||""
    ].filter(Boolean).join(" | ");
    body = {
      summary: `☐ ${item.title}`,
      description: desc,
      start:{ date:item.dueDate },
      end:  { date:item.dueDate },
      colorId: item.priority==="high"?"11":item.priority==="medium"?"5":"2",
      reminders:{ useDefault:false, overrides:[] },
      extendedProperties:{ private:{ taskmaster_id:String(item.id), taskmaster_priority:item.priority, taskmaster_type:"task" } }
    };
  }
  return gcalFetch(token, "/calendars/primary/events", "POST", body);
}

async function gcalDeleteEvent(token, gcalId) {
  return gcalFetch(token, "/calendars/primary/events/"+gcalId, "DELETE");
}

function gcalEventToItem(ev) {
  const dateStr = ev.start?.date || (ev.start?.dateTime||"").slice(0,10);
  const startT  = ev.start?.dateTime ? (ev.start.dateTime||"").slice(11,16) : "";
  const endT    = ev.end?.dateTime   ? (ev.end.dateTime||"").slice(11,16)   : "";
  const isApt   = !!(startT && endT && startT!==endT);
  const tid     = ev.extendedProperties?.private?.taskmaster_id;
  return {
    id: tid || ("gcal_"+ev.id),
    gcalId: ev.id,
    type: isApt ? "appointment" : "task",
    category: "work",
    title: ev.summary || "(No title)",
    priority: ev.extendedProperties?.private?.taskmaster_priority || "medium",
    dueDate: dateStr,
    dueTime: isApt ? "" : startT,
    startTime: isApt ? startT : "",
    endTime: isApt ? endT : "",
    location: ev.location || "",
    notes: (ev.description||"").replace(/\[TaskMaster Pro\][^\n]*/,"").trim(),
    recurrence: "none",
    done: false,
    fromGcal: true,
    synced: true,
    actionItems: [],
    createdAt: ev.created || new Date().toISOString(),
  };
}

// GCAL_SEED removed — use Pull from GCal to import events
const GCAL_SEED = [];

const PRIORITY = {

};
const RECURRENCE_OPTS = [

  { value:"site_visit",  label:"🏗 Site Visit",    color:"#DC2626", bg:"#FEF2F2" },
];
const DAYS_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DAYS_FULL  = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS     = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const WORK_DAYS  = [1,2,3,4,5];
const WORK_START = 9*60+30, WORK_END = 18*60, LUNCH_START = 12*60+30, LUNCH_END = 14*60;
const ALARM_MINUTES = 30;

const toKey    = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayKey = () => toKey(new Date());
const sameDay  = (a,b) => a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
const addDays  = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const toMins   = t => { if(!t) return 0; const[h,m]=t.split(":").map(Number); return h*60+m; };
const toHHMM   = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const fmt      = t => { if(!t) return ""; const[h,m]=t.split(":").map(Number); return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?"PM":"AM"}`; };
const durLabel = (t1,t2) => { const d=toMins(t2)-toMins(t1); if(d<=0) return ""; return d<60?`${d}m`:d%60?`${Math.floor(d/60)}h ${d%60}m`:`${Math.floor(d/60)}h`; };

function getWeekDates(base) {
  const s=new Date(base); s.setDate(s.getDate()-s.getDay()); s.setHours(0,0,0,0);
  return Array.from({length:7},(_,i)=>{ const d=new Date(s); d.setDate(s.getDate()+i); return d; });
}
function findSlots(dateKey, appts) {
  const d=new Date(dateKey); if(!WORK_DAYS.includes(d.getDay())) return [];
  const busy=appts.filter(a=>a.dueDate===dateKey&&a.startTime&&a.endTime)
    .map(a=>({s:toMins(a.startTime),e:toMins(a.endTime)}))
    .concat([{s:LUNCH_START,e:LUNCH_END}]).sort((a,b)=>a.s-b.s);
  const slots=[]; let cur=WORK_START;
  for(const b of busy){ if(cur+60<=b.s) slots.push({s:cur,e:b.s}); cur=Math.max(cur,b.e); }
  if(cur+60<=WORK_END) slots.push({s:cur,e:WORK_END});
  return slots;
}
function generateSuggestions(tasks, allItems) {
  const unscheduled=tasks.filter(t=>!t.done&&!t.dueTime&&t.type==="task");
  const appts=allItems.filter(i=>i.type==="appointment");
  const out=[]; const today=new Date();
  for(const task of unscheduled.slice(0,6)){
    const base=task.dueDate?new Date(task.dueDate):today;
    for(let off=0;off<7;off++){
      const tryDate=toKey(addDays(base,off)); const dd=new Date(tryDate);
      if(!WORK_DAYS.includes(dd.getDay())) continue;
      const slots=findSlots(tryDate,appts);
      if(slots.length){ const sl=slots[0]; out.push({ taskId:task.id, taskTitle:task.title, priority:task.priority, sugDate:tryDate, sugStart:toHHMM(sl.s), sugEnd:toHHMM(Math.min(sl.s+60,sl.e)), dayLabel:off===0?"Today":off===1?"Tomorrow":DAYS_FULL[dd.getDay()] }); break; }
    }
  }
  return out;
}

function getAlarmingItems(items, snoozedIds) {
  const now=new Date(); const nowMins=now.getHours()*60+now.getMinutes(); const todayStr=todayKey();
  return items.filter(item=>{
    if(item.done||snoozedIds.has(item.id)) return false;
    const qualifies=(item.type==="task"&&item.priority==="high")||item.type==="appointment";
    if(!qualifies) return false;
    const timeStr=item.type==="appointment"?item.startTime:item.dueTime;
    if(!timeStr||item.dueDate!==todayStr) return false;
    const minsUntil=toMins(timeStr)-nowMins;
    return minsUntil>=0&&minsUntil<=ALARM_MINUTES;
  });
}
function getOverdueItems(items) {
  const now=new Date(); const nowMins=now.getHours()*60+now.getMinutes(); const todayStr=todayKey();
  return items.filter(item=>{
    if(item.done) return false;
    const qualifies=(item.type==="task"&&item.priority==="high")||item.type==="appointment";
    if(!qualifies) return false;
    if(item.dueDate<todayStr) return true;
    const timeStr=item.type==="appointment"?item.startTime:item.dueTime;
    if(item.dueDate===todayStr&&timeStr) return toMins(timeStr)<nowMins;
    return false;
  });
}
async function sendBrowserNotification(title, body) {
  if(!("Notification" in window)) return;
  if(Notification.permission==="granted") new Notification(title,{body,tag:title});
  else if(Notification.permission!=="denied"){ const p=await Notification.requestPermission(); if(p==="granted") new Notification(title,{body,tag:title}); }
}

function loadData() {
  try {
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d=JSON.parse(raw);
      const seenIds=new Set();
      // Deduplicate by id AND by gcalId to prevent double-sync duplicates
      const seenGcalIds=new Set();
      const deduped=(d.items||[]).filter(i=>{
        if(seenIds.has(i.id)) return false;
        if(i.gcalId && seenGcalIds.has(i.gcalId)) return false;
        seenIds.add(i.id);
        if(i.gcalId) seenGcalIds.add(i.gcalId);
        return true;
      });
      const withActions=deduped.map(i=>({actionItems:[],...i}));
      return { items:withActions, reminders:d.reminders||[] };
    }
    return { items:[], reminders:[] };
  } catch { return { items:[], reminders:[] }; }
}
function saveData(d) { try { localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); } catch {} }
function loadSnoozed() { try { return new Set(JSON.parse(localStorage.getItem(SNOOZED_KEY)||"[]")); } catch { return new Set(); } }
function saveSnoozed(s) { try { localStorage.setItem(SNOOZED_KEY,JSON.stringify([...s])); } catch {} }

function App() {
  const [items, setItems]             = useState([]);
  const [reminders, setReminders]     = useState([]);
  const [tab, setTab]                 = useState("tasks");
  const [weekBase, setWeekBase]       = useState(new Date());
  const [selDate, setSelDate]         = useState(new Date());
  const [modal, setModal]             = useState(null);
  const [detailItem, setDetailItem]   = useState(null);
  const [deferItem, setDeferItem]     = useState(null);
  const [extendItem, setExtendItem]   = useState(null);
  const [suggestions, setSuggestions] = useState([]);
  const [showSuggest, setShowSuggest] = useState(false);
  const [filterType, setFilterType]   = useState("all");
  const [filterCat, setFilterCat]     = useState("all");
  const [weekGroup, setWeekGroup]     = useState("type");
  const [allGroup, setAllGroup]       = useState("type");
  const [calView, setCalView]         = useState("day"); // "day" | "3day" | "week"
  const [focusMode, setFocusMode]     = useState(false);
  const [energyFilter, setEnergyFilter] = useState(null); // active energy tag filter
  const [showCompleted, setShowCompleted] = useState(false); // accordion for completed tasks
  const [expandedSubtasks, setExpandedSubtasks] = useState(new Set()); // which tasks show subtasks
  const [alarmingItems, setAlarmingItems] = useState([]);
  const [overdueAlarms, setOverdueAlarms] = useState([]);
  const [snoozedIds, setSnoozedIds]   = useState(new Set());
  const [dismissedIds, setDismissedIds] = useState(new Set());
  const [notifPerm, setNotifPerm]     = useState("default");
  const [minsNow, setMinsNow]         = useState(new Date().getHours()*60+new Date().getMinutes());
  const lastFiredRef = useRef(new Set());
  const quickRef = useRef(null);
  const [quickText, setQuickText]     = useState("");
  const [quickPriority, setQuickPriority] = useState("high");


  // ── GOOGLE CALENDAR OAUTH & SYNC STATE ──
  const [gcalToken, setGcalToken]   = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null); // item to confirm delete
  const [showPWABanner, setShowPWABanner] = useState(false);
  const [deferredPrompt, setDeferredPrompt] = useState(null);
  const [gcalUser, setGcalUser]     = useState(null);
  const [syncStatus, setSyncStatus] = useState("");
  const [syncing, setSyncing]       = useState(false);
  const [syncLog, setSyncLog]       = useState([]);
  const gcalClientRef = useRef(null);

  const blank  = { type:"task", category:"work", title:"", priority:"high", dueDate:todayKey(), dueTime:"", startTime:"", endTime:"", location:"", notes:"", estimatedMins:60, recurrence:"none", actionItems:[] };
  const blankR = { title:"", date:todayKey(), time:"09:00", notes:"" };
  const [form, setForm]   = useState(blank);
  const [rform, setRform] = useState(blankR);

  // PWA install prompt
  useEffect(() => {
    const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); setShowPWABanner(true); };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  useEffect(() => {
    const d=loadData(); setItems(d.items); setReminders(d.reminders);
    setSnoozedIds(loadSnoozed());
    if("Notification" in window) setNotifPerm(Notification.permission);
    // Restore saved token
    const savedTok = localStorage.getItem(GCAL_TOKEN_KEY);
    if(savedTok) { try { const t=JSON.parse(savedTok); if(t.expires>Date.now()) { setGcalToken(t.access_token); setGcalUser(t.email||USER_EMAIL); } } catch {} }
  }, []);

  // Init Google OAuth client once GSI script loads
  useEffect(() => {
    if(!IS_CONFIGURED) return;
    const init = () => {
      if(!window.google?.accounts?.oauth2) return;
      gcalClientRef.current = window.google.accounts.oauth2.initTokenClient({
        client_id: GCAL_CLIENT_ID,
        scope: GCAL_SCOPE,
        callback: (resp) => {
          if(resp.access_token) {
            setGcalToken(resp.access_token);
            setGcalUser(USER_EMAIL);
            const expiry = Date.now() + (resp.expires_in||3600)*1000;
            localStorage.setItem(GCAL_TOKEN_KEY, JSON.stringify({ access_token:resp.access_token, expires:expiry, email:USER_EMAIL }));
            setSyncStatus("✅ Connected to Google Calendar!");
          } else { setSyncStatus("❌ Sign-in failed. Try again."); }
        }
      });
    };
    if(window.google) init(); else window.addEventListener('load', init);
  }, []);

  const signInGcal = () => {
    if(!IS_CONFIGURED) { setSyncStatus("⚠️ Please add your Google Client ID first. See setup instructions in the Sync tab."); return; }
    if(!gcalClientRef.current) { setSyncStatus("Google not loaded yet. Try again in a moment."); return; }
    gcalClientRef.current.requestAccessToken();
  };

  const signOutGcal = () => {
    setGcalToken(null); setGcalUser(null);
    localStorage.removeItem(GCAL_TOKEN_KEY);
    setSyncStatus("Disconnected from Google Calendar.");
  };

  const addSyncLog = (msg, ok=true) => setSyncLog(p=>[{msg,ok,ts:new Date().toLocaleTimeString()},...p].slice(0,30));

  // PULL from Google Calendar → merge into app
  const pullFromGcal = async () => {
    if(!gcalToken) { setSyncStatus("Please sign in first."); return; }
    setSyncing(true); setSyncStatus("⏳ Pulling from Google Calendar...");
    try {
      const events = await gcalListEvents(gcalToken);
      const current = [...items];
      // Build dedup sets from both gcalId and taskmaster_id
      const seenGcalIds = new Set(current.map(i=>i.gcalId).filter(Boolean));
      const seenTaskIds = new Set(current.map(i=>i.id).filter(Boolean));
      let added=0, updated=0;
      for(const ev of events) {
        // Skip events pushed by TaskMaster (they already exist by taskmaster_id)
        const tid = ev.extendedProperties?.private?.taskmaster_id;
        if(tid && seenTaskIds.has(tid)) {
          // Update gcalId if missing
          const idx = current.findIndex(i=>i.id===tid);
          if(idx>=0 && !current[idx].gcalId) { current[idx]={...current[idx], gcalId:ev.id, synced:true}; updated++; }
          continue;
        }
        if(seenGcalIds.has(ev.id)) continue; // already have this gcal event
        const item = gcalEventToItem(ev);
        // Strip HTML tags from notes
        item.notes = item.notes.replace(/<[^>]*>/g,'').trim();
        current.push(item); added++;
        seenGcalIds.add(ev.id);
        seenTaskIds.add(item.id);
      }
      const clean = persist(current, null); setItems(clean);
      // Clean up tombstoned deletions — remove items that were deleted on another device
      try {
        const deletedIds = JSON.parse(localStorage.getItem('taskmaster_deleted')||'[]');
        if(deletedIds.length>0) {
          const delIdSet = new Set(deletedIds.map(d=>d.id));
          const delGcalSet = new Set(deletedIds.map(d=>d.gcalId).filter(Boolean));
          const beforeCount = current.length;
          const cleaned = current.filter(i=> !delIdSet.has(i.id) && !(i.gcalId && delGcalSet.has(i.gcalId)));
          if(cleaned.length < beforeCount) {
            const removed = beforeCount - cleaned.length;
            setItems(cleaned); persist(cleaned, null);
            addSyncLog(`🗑 Cleaned ${removed} deleted item${removed!==1?'s':''} from other device`);
          }
        }
      } catch(e) {}
      const msg = `✅ Pulled ${added} new event${added!==1?"s":""} from Google Calendar`;
      setSyncStatus(msg); addSyncLog(msg);
      localStorage.setItem('taskmaster_last_pull', new Date().toLocaleString('en-SG',{timeZone:'Asia/Singapore'}));
    } catch(e) { const msg="❌ Pull failed: "+e.message; setSyncStatus(msg); addSyncLog(msg,false); }
    setSyncing(false);
  };

  // PUSH single item to Google Calendar
  const pushToGcal = async (item) => {
    if(!gcalToken) return;
    try {
      const ev = await gcalCreateEvent(gcalToken, item);
      if(ev?.id) {
        const u = items.map(i=>i.id===item.id?{...i,gcalId:ev.id,synced:true}:i);
        setItems(u); persist(u, null);
        addSyncLog("✅ Pushed: "+item.title);
      }
    } catch(e) { addSyncLog("❌ Push failed: "+item.title+" — "+e.message, false); }
  };

  // DELETE from Google Calendar
  const deleteFromGcal = async (gcalId) => {
    if(!gcalToken||!gcalId) return;
    try { await gcalDeleteEvent(gcalToken, gcalId); addSyncLog("🗑 Deleted from GCal"); }
    catch(e) { addSyncLog("⚠️ GCal delete failed: "+e.message, false); }
  };

  const persist = useCallback((it,rm) => {
    const seenIds=new Set();
    const clean=(it??items).filter(i=>{ if(seenIds.has(i.id)) return false; seenIds.add(i.id); return true; });
    saveData({ items:clean, reminders:rm??reminders }); return clean;
  }, [items, reminders]);

  useEffect(() => { if(items.length>0) setSuggestions(generateSuggestions(items,items)); }, [items]);

  useEffect(() => {
    const tick = () => {
      const now=new Date(); setMinsNow(now.getHours()*60+now.getMinutes());
      const alarming=getAlarmingItems(items,snoozedIds).filter(i=>!dismissedIds.has(i.id));
      const overdue=getOverdueItems(items).filter(i=>!dismissedIds.has(i.id));
      setAlarmingItems(alarming); setOverdueAlarms(overdue);
      for(const item of alarming){
        if(!lastFiredRef.current.has(item.id)){
          lastFiredRef.current.add(item.id);
          const t=item.type==="appointment"?item.startTime:item.dueTime;
          const m=toMins(t)-(now.getHours()*60+now.getMinutes());
          sendBrowserNotification(`⏰ ${item.type==="appointment"?"Meeting":"Task"} in ${m} min`,item.title);
        }
      }
    };
    tick();
    const iv=setInterval(tick, 15*60*1000);
    return () => clearInterval(iv);

      deletedIds.push({ id, gcalId:item.gcalId||null, deletedAt:new Date().toISOString() });

    if(diff<0) return null;
    if(diff<=60) return { label:`Starts in ${diff}m`, pulse:false, color:"#D97706" };

    aiBtn:(c,bg)=>({ fontSize:10, color:c, background:bg, borderRadius:6, padding:"3px 8px", cursor:"pointer", fontWeight:700, border:`1px solid ${c}25` }),
    aiInputRow:{ display:"flex", gap:7, marginTop:10, alignItems:"center" },
    aiInput:{ flex:1, background:"#F8FAFC", border:`1.5px solid ${C.border}`, borderRadius:9, padding:"8px 11px", color:C.text, fontSize:14, outline:"none", fontFamily:"inherit" },
    aiAddBtn:{ width:34, height:34, borderRadius:9, background:C.teal, border:"none", color:"#fff", fontSize:18, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 },
    fab: c=>({ position:"fixed", bottom:82, right:15, width:52, height:52, borderRadius:"50%", background:`linear-gradient(135deg,${c},${c}DD)`, border:"none", color:"#fff", fontSize:22, cursor:"pointer", boxShadow:`0 6px 20px ${c}55`, display:"flex", alignItems:"center", justifyContent:"center", zIndex:100 }),
    nav:{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:430, background:"#fff", borderTop:"1px solid #F3F4F6", display:"flex", zIndex:200, boxShadow:"0 -2px 16px rgba(0,0,0,0.08)" },
    navBtn: a=>({ flex:1, padding:"9px 2px 13px", background:"none", border:"none", color:a?C.blue:C.textL, fontSize:a?20:18, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:2, position:"relative" }),
    navLbl: a=>({ fontSize:8, fontWeight:700, letterSpacing:1, textTransform:"uppercase", color:a?C.blue:C.textL }),
    navAlert:{ position:"absolute", top:6, right:8, width:8, height:8, borderRadius:"50%", background:"#EF4444", border:"2px solid #fff" },
    empty:{ textAlign:"center", padding:"24px 8px", color:C.textL },
    // Status badge
    statusBadge: (st)=>({ display:"inline-flex",alignItems:"center",gap:3,fontSize:9,fontWeight:800,letterSpacing:0.8,color:STATUS[st]?.color||"#6B7280",background:STATUS[st]?.bg||"#F9FAFB",border:`1px solid ${STATUS[st]?.border||"#E5E7EB"}`,borderRadius:5,padding:"2px 6px" }),
    // Subtask progress bar
    subtaskBar:{ background:"#E5E7EB",borderRadius:4,height:4,overflow:"hidden",marginTop:5 },
    subtaskFill: pct=>({ height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,#059669,#34D399)`,borderRadius:4,transition:"width .4s" }),
    // Energy tag pill
    energyTag: tag=>({ display:"inline-flex",alignItems:"center",gap:3,fontSize:9,fontWeight:800,color:tag.color,background:tag.bg,border:`1px solid ${tag.color}33`,borderRadius:5,padding:"2px 7px" }),
    // Focus mode overlay
    focusCard:{ background:"linear-gradient(135deg,#1E3A8A,#1D4ED8)",borderRadius:18,padding:"20px 16px",marginBottom:12,color:"#fff",boxShadow:"0 8px 32px rgba(30,64,175,0.3)" },
    // Countdown
    countdownChip: (c)=>({ display:"inline-flex",alignItems:"center",gap:4,fontSize:10,fontWeight:800,color:c||"#D97706",background:c==="#DC2626"?"#FEF2F2":"#FFF7ED",border:`1.5px solid ${c||"#D97706"}44`,borderRadius:8,padding:"3px 8px" }),
    // Pulse animation (inline)
    pulseDot:{ width:8,height:8,borderRadius:"50%",background:"#DC2626",display:"inline-block",marginRight:4,animation:"pulse 1.5s infinite" },
    countdownPill: mins=>({ display:"inline-flex", alignItems:"center", gap:4, background:mins<=10?"#FEF2F2":"#FFF7ED", border:`1.5px solid ${mins<=10?C.red:C.orange}`, borderRadius:20, padding:"4px 12px", fontSize:13, fontWeight:900, color:mins<=10?C.red:C.orange }),
    notifBanner:{ background:"#EFF6FF", border:`1.5px solid #BFDBFE`, borderRadius:12, padding:"10px 13px", marginBottom:12, display:"flex", justifyContent:"space-between", alignItems:"center" },
  };

  // ── ITEM CARD ──
  const ItemCard = ({ item, showDate=false }) => {
    const isApt = item.type==="appointment";
    const status = getTaskStatus(item);
    const st = STATUS[status];
    const isOverdue = status==="overdue";
    const countdown = getCountdown(item);
    const timeLabel = isApt&&item.startTime&&item.endTime ? `${fmt(item.startTime)} – ${fmt(item.endTime)}` : item.dueTime ? fmt(item.dueTime) : "";
    const dur = isApt ? durLabel(item.startTime,item.endTime) : item.estimatedMins ? `~${item.estimatedMins<60?item.estimatedMins+"m":Math.floor(item.estimatedMins/60)+"h"}` : "";
    const actionsDone = (item.actionItems||[]).filter(a=>a.done).length;
    const actionsTotal = (item.actionItems||[]).length;
    const subtasks = item.subtasks||[];
    const subDone = subtasks.filter(s=>s.done).length;
    const subTotal = subtasks.length;
    const subPct = subTotal>0 ? Math.round((subDone/subTotal)*100) : 0;
    const hasNotes = item.notes&&item.notes.trim().length>0;
    const energyTag = ENERGY_TAGS.find(t=>t.value===item.energyTag);
    const [subInput, setSubInput] = useState("");

    // Apply energy filter
    if(energyFilter && item.energyTag !== energyFilter && !isApt) return null;

    // Card border color based on status
    const borderColor = item.done ? C.border : isApt ? C.blue+"44" : st.border;
    const borderLeft = item.done ? "#CBD5E1" : isApt ? C.blue : st.color;
    const bgColor = item.done ? "#F8FAFC" : isApt ? "#EFF6FF" : st.bg;

    return (
      <div className="task-card" style={{background:bgColor,border:`1.5px solid ${borderColor}`,borderLeft:`4px solid ${borderLeft}`,borderRadius:14,padding:"12px 12px 10px",marginBottom:8,opacity:item.done?0.55:1,transition:"opacity .3s"}}>
        <div style={{display:"flex",gap:9,alignItems:"flex-start"}}>
          {/* Checkbox */}
          {!isApt
            ? <div style={{width:22,height:22,minWidth:22,borderRadius:7,border:`2px solid ${item.done?st.color:C.border}`,background:item.done?st.color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",marginTop:1,cursor:"pointer",flexShrink:0,transition:"all .2s"}} onClick={()=>toggleDone(item.id)}>
                {item.done&&<span style={{fontSize:11,color:"#fff",fontWeight:900}}>✓</span>}
              </div>
            : <span style={{fontSize:18,flexShrink:0,marginTop:1}}>📅</span>
          }
          <div style={{flex:1,minWidth:0}}>
            {/* Title row */}
            <div style={{fontSize:14,fontWeight:700,color:item.done?C.textL:C.text,textDecoration:item.done?"line-through":"none",marginBottom:4,lineHeight:1.3,cursor:"pointer"}} onClick={()=>setDetailItem(item)}>{item.title}</div>

            {/* Tags row */}
            <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center",marginBottom:4}}>
              {/* Status badge */}
              {!isApt&&<span style={S.statusBadge(status)}><span style={{width:5,height:5,borderRadius:"50%",background:st.dot,display:"inline-block"}}></span>{status==="overdue"?"Overdue":status==="due_soon"?"Due Soon":status==="scheduled"?"Scheduled":status==="completed"?"Done":"–"}</span>}
              {/* Priority */}
              {!isApt&&<span style={S.badge(PRIORITY[item.priority].color,PRIORITY[item.priority].bg,PRIORITY[item.priority].border)}>{PRIORITY[item.priority].label}</span>}
              {/* Category */}
              <span style={S.catBadge(item.category)}>{CATEGORY[item.category].icon}</span>
              {/* Date */}
              {showDate&&<span style={{...S.tTag,color:C.textM,background:"#F1F5F9",fontSize:9}}>{item.dueDate}</span>}
              {/* Time */}
              {timeLabel&&<span style={{...S.tTag,fontSize:10}}>{timeLabel}</span>}
              {/* Duration */}
              {dur&&<span style={S.dTag}>{dur}</span>}
              {/* Recurrence */}
              {item.recurrence&&item.recurrence!=="none"&&<span style={S.badge(C.purple,C.purpleL,"#DDD6FE")}>🔄</span>}
              {/* GCal */}
              {item.fromGcal&&<span style={S.gcalTag}>GCal</span>}
              {/* Energy tag */}
              {energyTag&&<span style={S.energyTag(energyTag)}>{energyTag.label}</span>}
              {/* Action items count */}
              {actionsTotal>0&&<span style={S.actionCount(actionsTotal)}>✅ {actionsDone}/{actionsTotal}</span>}
              {/* Subtask count */}
              {subTotal>0&&<span style={{fontSize:9,color:"#059669",background:"#F0FDF4",border:"1px solid #A7F3D0",borderRadius:4,padding:"2px 6px",fontWeight:700}}>◻ {subDone}/{subTotal}</span>}
            </div>

            {/* Countdown for meetings */}
            {countdown&&<div style={{marginBottom:5}}>
              <span style={S.countdownChip(countdown.color)}>
                {countdown.pulse&&<span style={S.pulseDot}/>}{countdown.label}
              </span>
            </div>}

            {/* Subtask progress bar */}
            {subTotal>0&&<div style={{marginBottom:5}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                <span style={{fontSize:9,color:C.textL,fontWeight:700}}>Progress</span>
                <span style={{fontSize:9,color:"#059669",fontWeight:800}}>{subPct}%</span>
              </div>
              <div style={S.subtaskBar}><div style={S.subtaskFill(subPct)}/></div>
            </div>}

            {/* Notes snippet */}
            {hasNotes&&<div style={S.noteSnippet}>📝 {item.notes.length>55?item.notes.slice(0,55)+"…":item.notes}</div>}

            {/* Action items preview */}
            {(item.actionItems||[]).filter(a=>!a.done).length>0&&(
              <div style={{marginTop:4,paddingTop:4,borderTop:`1px solid ${C.border}`}}>
                {(item.actionItems||[]).filter(a=>!a.done).slice(0,2).map(a=>(
                  <div key={a.id} style={{fontSize:11,color:"#0D9488",display:"flex",gap:5,alignItems:"center",marginBottom:1}}>
                    <span>→</span><span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.text}</span>
                  </div>
                ))}
                {(item.actionItems||[]).filter(a=>!a.done).length>2&&<div style={{fontSize:9,color:C.textL}}>+{(item.actionItems||[]).filter(a=>!a.done).length-2} more</div>}
              </div>
            )}

            {/* Subtasks list (expandable) */}
            {subTotal>0&&expandedSubtasks.has(item.id)&&(
              <div style={{marginTop:6,paddingTop:5,borderTop:`1px solid ${C.border}`}}>
                {subtasks.map(s=>(
                  <div key={s.id} style={{display:"flex",gap:7,alignItems:"center",padding:"3px 0"}}>
                    <div style={{width:16,height:16,minWidth:16,borderRadius:4,border:`2px solid ${s.done?"#059669":C.border}`,background:s.done?"#059669":"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={()=>toggleSubtask(item.id,s.id)}>
                      {s.done&&<span style={{fontSize:8,color:"#fff",fontWeight:900}}>✓</span>}
                    </div>
                    <span style={{fontSize:12,color:s.done?C.textL:C.text,textDecoration:s.done?"line-through":"none",flex:1}}>{s.text}</span>
                    <button style={{background:"none",border:"none",color:C.border,fontSize:11,cursor:"pointer"}} onClick={()=>deleteSubtask(item.id,s.id)}>✕</button>
                  </div>
                ))}
                {/* Add subtask input */}
                <div style={{display:"flex",gap:6,marginTop:5}}>
                  <input style={{flex:1,background:"#F8FAFC",border:`1px solid ${C.border}`,borderRadius:7,padding:"5px 8px",fontSize:12,outline:"none",fontFamily:"inherit"}}
                    placeholder="Add subtask…" value={subInput} onChange={e=>setSubInput(e.target.value)}
                    onKeyDown={e=>{ if(e.key==="Enter"){ addSubtask(item.id,subInput); setSubInput(""); }}}
                  />
                  <button style={{background:C.teal,border:"none",borderRadius:7,padding:"5px 10px",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:700}} onClick={()=>{ addSubtask(item.id,subInput); setSubInput(""); }}>+</button>
                </div>
              </div>
            )}

            {/* Chip row */}
            <div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap"}}>
              <span style={S.chip(C.blue,"#EFF6FF")} onClick={()=>setDetailItem(item)}>✏️ Edit</span>
              {!isApt&&!item.done&&<span style={S.chip(C.purple,C.purpleL)} onClick={()=>setDeferItem(item)}>↷</span>}
              {!isApt&&!item.done&&<span style={S.chip(C.blue,C.blueL)} onClick={()=>setExtendItem(item)}>+Time</span>}
              {!isApt&&<span style={S.chip("#059669","#F0FDF4")} onClick={()=>setExpandedSubtasks(p=>{ const n=new Set(p); n.has(item.id)?n.delete(item.id):n.add(item.id); return n; })}>◻ {subTotal>0?`${subDone}/${subTotal}`:"Sub"}</span>}
              {isApt&&!item.done&&<span style={S.chip("#6B7280","#F3F4F6")} onClick={()=>cancelItem(item.id)}>✕ Cancel</span>}
              {!isApt&&<span style={S.chip(C.red,C.redL)} onClick={()=>setDeleteConfirm(item)}>🗑</span>}
            </div>
          </div>
          <button style={S.delBtn} onClick={()=>setDeleteConfirm(item)}>✕</button>
        </div>
      </div>
    );
  };

  // ── BREAKDOWN ──
  const BreakdownSection = ({ groupMode, itemList }) => {
    if(!itemList.length) return <div style={S.empty}><div style={{fontSize:32,marginBottom:4}}>🎉</div>Nothing here</div>;
    if(groupMode==="type"){
      const mtgs=itemList.filter(i=>i.type==="appointment"); const pend=itemList.filter(i=>i.type==="task"&&!i.done); const done=itemList.filter(i=>i.type==="task"&&i.done);
      return (<>{mtgs.length>0&&<><div style={S.typeHdr(C.blue,C.blueL)}><span style={S.typeHdrT(C.blue)}>📅 Meetings</span><span style={S.typeHdrC(C.blue)}>{mtgs.length}</span></div>{mtgs.map(i=><ItemCard key={i.id} item={i} showDate/>)}</>}{pend.length>0&&<><div style={S.typeHdr(C.red,C.redL)}><span style={S.typeHdrT(C.red)}>📋 Pending</span><span style={S.typeHdrC(C.red)}>{pend.length}</span></div>{pend.map(i=><ItemCard key={i.id} item={i} showDate/>)}</>}{done.length>0&&<><div style={S.typeHdr("#94A3B8","#F8FAFC")}><span style={S.typeHdrT("#94A3B8")}>✅ Done</span><span style={S.typeHdrC("#94A3B8")}>{done.length}</span></div>{done.map(i=><ItemCard key={i.id} item={i} showDate/>)}</>}</>);
    }
    if(groupMode==="priority"){
      const mtgs=itemList.filter(i=>i.type==="appointment");
      return (<>{["high","medium","low"].map(p=>{ const grp=itemList.filter(i=>i.type==="task"&&i.priority===p); if(!grp.length) return null; return <div key={p}><div style={S.typeHdr(PRIORITY[p].color,PRIORITY[p].bg)}><span style={S.typeHdrT(PRIORITY[p].color)}>{PRIORITY[p].label}</span><span style={S.typeHdrC(PRIORITY[p].color)}>{grp.length}</span></div>{grp.map(i=><ItemCard key={i.id} item={i} showDate/>)}</div>; })}{mtgs.length>0&&<><div style={S.typeHdr(C.blue,C.blueL)}><span style={S.typeHdrT(C.blue)}>📅 Meetings</span><span style={S.typeHdrC(C.blue)}>{mtgs.length}</span></div>{mtgs.map(i=><ItemCard key={i.id} item={i} showDate/>)}</>}</>);
    }
    return (<>{["work","personal"].map(cat=>{ const grp=itemList.filter(i=>i.category===cat); if(!grp.length) return null; return <div key={cat}><div style={S.typeHdr(CATEGORY[cat].color,CATEGORY[cat].bg)}><span style={S.typeHdrT(CATEGORY[cat].color)}>{CATEGORY[cat].icon} {CATEGORY[cat].label}</span><span style={S.typeHdrC(CATEGORY[cat].color)}>{grp.length}</span></div>{grp.map(i=><ItemCard key={i.id} item={i} showDate/>)}</div>; })}</>);
  };

  // ── DETAIL / EDIT MODAL ──
  const DetailModal = () => {
    if(!detailItem) return null;
    const item = items.find(i=>i.id===detailItem.id)||detailItem;
    const isApt = item.type==="appointment";
    const [editMode, setEditMode]           = useState(false);
    const [editTitle, setEditTitle]         = useState(item.title);
    const [editDate, setEditDate]           = useState(item.dueDate);
    const [editDueTime, setEditDueTime]     = useState(item.dueTime||"");
    const [editStartTime, setEditStartTime] = useState(item.startTime||"");
    const [editEndTime, setEditEndTime]     = useState(item.endTime||"");
    const [editPriority, setEditPriority]   = useState(item.priority);
    const [editCategory, setEditCategory]   = useState(item.category);
    const [editLocation, setEditLocation]   = useState(item.location||"");
    const [editRecurrence, setEditRecurrence] = useState(item.recurrence||"none");
    const [editEstMins, setEditEstMins]     = useState(item.estimatedMins||60);
    const [localNotes, setLocalNotes]       = useState(item.notes||"");
    const [localActionText, setLocalActionText] = useState("");

    const saveEdits = () => {
      updateItemField(item.id, { title:editTitle.trim()||item.title, dueDate:editDate, dueTime:editDueTime, startTime:editStartTime, endTime:editEndTime, priority:editPriority, category:editCategory, location:editLocation, recurrence:editRecurrence, estimatedMins:editEstMins, notes:localNotes });
      setEditMode(false);
    };

    const ef = { width:"100%", background:"#F8FAFC", border:`1.5px solid ${C.blue}55`, borderRadius:9, padding:"9px 11px", color:C.text, fontSize:16, outline:"none", boxSizing:"border-box", fontFamily:"inherit", marginBottom:8 };

    return (
      <div style={S.overlay} onClick={()=>{ if(!editMode) setDetailItem(null); }}>
        <div style={S.sheet} onClick={e=>e.stopPropagation()}>
          {!editMode ? (<>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div style={{flex:1,paddingRight:8}}>
                <div style={{fontSize:11,color:isApt?C.blue:PRIORITY[item.priority].color,fontWeight:700,marginBottom:3,textTransform:"uppercase",letterSpacing:1}}>{isApt?"📅 Meeting":"📋 "+PRIORITY[item.priority].label+" Priority"}</div>
                <div style={{fontSize:18,fontWeight:900,color:C.text,lineHeight:1.2}}>{item.title}</div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {!isApt&&<div style={{...S.chk(item.done,item.priority),width:28,height:28,borderRadius:8}} onClick={()=>toggleDone(item.id)}>{item.done&&<span style={{fontSize:12,color:"#fff",fontWeight:900}}>✓</span>}</div>}
                <button onClick={()=>setEditMode(true)} style={{background:C.blueL,border:`1.5px solid ${C.blue}44`,borderRadius:9,padding:"6px 13px",color:C.blue,fontWeight:800,fontSize:12,cursor:"pointer"}}>✏️ Edit</button>
              </div>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
              <span style={S.tTag}>📅 {item.dueDate}</span>
              {isApt&&item.startTime&&<span style={S.tTag}>{fmt(item.startTime)} – {fmt(item.endTime)}</span>}
              {isApt&&item.startTime&&<span style={S.dTag}>{durLabel(item.startTime,item.endTime)}</span>}
              {!isApt&&item.dueTime&&<span style={S.tTag}>⏰ {fmt(item.dueTime)}</span>}
              {!isApt&&item.estimatedMins&&<span style={S.dTag}>~{item.estimatedMins<60?item.estimatedMins+"m":Math.floor(item.estimatedMins/60)+"h"}</span>}
              <span style={S.catBadge(item.category)}>{CATEGORY[item.category].icon} {CATEGORY[item.category].label}</span>
              {item.recurrence&&item.recurrence!=="none"&&<span style={S.badge(C.purple,C.purpleL,"#DDD6FE")}>🔄 {item.recurrence}</span>}
              {item.location&&<span style={{...S.tTag,color:"#059669",background:"#ECFDF5"}}>📍 {item.location}</span>}
            </div>
            <div style={S.lbl}>📝 Notes</div>
            <textarea style={S.textarea} placeholder="Add notes…" value={localNotes} onChange={e=>setLocalNotes(e.target.value)} onBlur={()=>updateItemField(item.id,{notes:localNotes})}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={S.lbl}>✅ Action Items</div>
              {(item.actionItems||[]).length>0&&<span style={{fontSize:10,color:C.textL}}>{(item.actionItems||[]).filter(a=>a.done).length}/{(item.actionItems||[]).length} done</span>}
            </div>
            {(item.actionItems||[]).length===0&&<div style={{fontSize:12,color:C.textL,marginBottom:8,fontStyle:"italic"}}>{isApt?"No action items yet — add follow-ups from this meeting":"No action items yet"}</div>}
            {(item.actionItems||[]).map(action=>(
              <div key={action.id} style={S.aiCard(action.done)}>
                <div style={S.aiChk(action.done)} onClick={()=>toggleActionItem(item.id,action.id)}>{action.done&&<span style={{fontSize:9,color:"#fff",fontWeight:900}}>✓</span>}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={S.aiText(action.done)}>{action.text}</div>
                  {!action.done&&<div style={S.aiActions}><span style={S.aiBtn(C.blue,C.blueL)} onClick={()=>promoteActionItem(item,action)}>→ Make task</span><span style={S.aiBtn(C.red,"#FEF2F2")} onClick={()=>deleteActionItem(item.id,action.id)}>Delete</span></div>}
                </div>
              </div>
            ))}
            <div style={S.aiInputRow}>
              <input style={S.aiInput} placeholder={isApt?"Add follow-up action…":"Add action item…"} value={localActionText}
                onChange={e=>setLocalActionText(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter"){ addActionItem(item.id,localActionText); setLocalActionText(""); }}}
              />
              <button style={S.aiAddBtn} onClick={()=>{ addActionItem(item.id,localActionText); setLocalActionText(""); }}>+</button>
            </div>
            {!isApt&&!item.done&&<div style={{display:"flex",gap:7,marginTop:14}}><button style={{...S.aBtn(C.purple),flex:1,marginTop:0}} onClick={()=>{setDetailItem(null);setDeferItem(item);}}>↷ Next Week</button><button style={{...S.aBtn(C.blue),flex:1,marginTop:0}} onClick={()=>{setDetailItem(null);setExtendItem(item);}}>+ Time</button></div>}
            <button style={S.cancelBtn} onClick={()=>setDetailItem(null)}>Close</button>
          </>) : (<>
            <div style={{fontSize:16,fontWeight:900,color:C.text,marginBottom:14}}>✏️ Edit {isApt?"Meeting":"Task"}</div>
            <div style={S.lbl}>Title</div>
            <input style={ef} value={editTitle} onChange={e=>setEditTitle(e.target.value)}/>
            <div style={S.lbl}>Category</div>
            <div style={{display:"flex",gap:6,marginBottom:10}}>
              <button style={S.seg(editCategory==="work",C.blue,C.blueL)} onClick={()=>setEditCategory("work")}>💼 Work</button>
              <button style={S.seg(editCategory==="personal",C.purple,C.purpleL)} onClick={()=>setEditCategory("personal")}>🏠 Personal</button>
            </div>

              const WSTART=9*60+30,WEND=18*60,LSTART=12*60+30,LEND=14*60;
              const dur=editEstMins||60;
              let found=false;
              const startFrom=editDate?new Date(editDate):new Date();
              for(let day=0;day<14&&!found;day++){
                const tryDate=addDays(startFrom,day);

                  cur=Math.max(cur,b.e);
                }
                if(!scheduled&&cur+dur<=WEND){ setEditDate(dk);setEditDueTime(toHHMM(cur));found=true; }

  // ── ALL TAB ──
  // ── TODOIST-STYLE TASKS TAB ──
  const renderTasks = () => {
    const now = new Date(); const todStr = todayKey(); const tomStr = toKey(addDays(now,1));
    const allTasks = items.filter(i=>i.type==="task");
    const overdue  = allTasks.filter(i=>!i.done&&i.dueDate<todStr).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
    const todayT   = allTasks.filter(i=>!i.done&&i.dueDate===todStr).sort((a,b)=>(a.dueTime||"99:99").localeCompare(b.dueTime||"99:99"));
    const upcoming = allTasks.filter(i=>!i.done&&i.dueDate>todStr).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
    const noDue    = allTasks.filter(i=>!i.done&&!i.dueDate);
    const done     = allTasks.filter(i=>i.done);

    // Apply energy filter
    const applyEF = list => energyFilter ? list.filter(i=>i.energyTag===energyFilter) : list;

    const priDot = p => ({high:"#DC2626",medium:"#F97316",low:"#3B82F6",undefined:"#D1D5DB"}[p]||"#D1D5DB");

    const TaskRow = ({item}) => {
      const [subInput, setSubInput] = useState("");
      const subtasks = item.subtasks||[];
      const subDone = subtasks.filter(s=>s.done).length;
      const subTotal = subtasks.length;
      const subPct = subTotal>0?Math.round((subDone/subTotal)*100):0;
      const isExpanded = expandedSubtasks.has(item.id);
      const countdown = getCountdown(item);
      const energyTag = ENERGY_TAGS.find(t=>t.value===item.energyTag);
      return (
        <div style={{borderBottom:"1px solid #F3F4F6",paddingBottom:2,marginBottom:2,opacity:item.done?0.45:1,transition:"opacity .3s"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"9px 0 5px"}}>
            {/* Priority dot / checkbox */}
            <div onClick={()=>toggleDone(item.id)} style={{width:20,height:20,minWidth:20,borderRadius:"50%",border:`2px solid ${priDot(item.priority)}`,background:item.done?priDot(item.priority):"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",marginTop:1,flexShrink:0,transition:"all .15s"}}>
              {item.done&&<span style={{fontSize:10,color:"#fff",fontWeight:900}}>✓</span>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              {/* Title */}
              <div style={{fontSize:15,fontWeight:500,color:item.done?"#9CA3AF":"#111827",textDecoration:item.done?"line-through":"none",lineHeight:1.35,cursor:"pointer",marginBottom:3}} onClick={()=>setDetailItem(item)}>{item.title}</div>
              {/* Meta row */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                {item.dueDate&&<span style={{fontSize:11,color:item.dueDate<todStr&&!item.done?"#DC2626":item.dueDate===todStr?"#059669":"#6B7280",fontWeight:500}}>
                  {item.dueDate===todStr?"Today":item.dueDate===tomStr?"Tomorrow":item.dueDate}
                  {item.dueTime?` · ${fmt(item.dueTime)}`:""}
                </span>}
                {item.estimatedMins&&<span style={{fontSize:11,color:"#9CA3AF"}}>~{item.estimatedMins<60?item.estimatedMins+"m":Math.floor(item.estimatedMins/60)+"h"}</span>}
                {energyTag&&<span style={{fontSize:10,fontWeight:600,color:energyTag.color,background:energyTag.bg,borderRadius:4,padding:"1px 6px"}}>{energyTag.label}</span>}
                {item.fromGcal&&<span style={{fontSize:10,color:"#059669",background:"#F0FDF4",borderRadius:4,padding:"1px 6px",fontWeight:600}}>GCal</span>}
                {subTotal>0&&<span style={{fontSize:11,color:"#6B7280"}}>◻ {subDone}/{subTotal}</span>}
                {countdown&&<span style={{fontSize:10,fontWeight:700,color:countdown.color}}>{countdown.label}</span>}
              </div>
              {/* Subtask progress bar */}
              {subTotal>0&&<div style={{marginTop:5,background:"#F3F4F6",borderRadius:3,height:3,overflow:"hidden"}}><div style={{height:"100%",width:`${subPct}%`,background:"#059669",borderRadius:3,transition:"width .4s"}}/></div>}
              {/* Subtasks expanded */}
              {isExpanded&&<div style={{marginTop:6,paddingLeft:4}}>
                {subtasks.map(s=>(
                  <div key={s.id} style={{display:"flex",gap:8,alignItems:"center",padding:"4px 0",borderBottom:"1px solid #F9FAFB"}}>
                    <div onClick={()=>toggleSubtask(item.id,s.id)} style={{width:16,height:16,minWidth:16,borderRadius:"50%",border:`2px solid ${priDot(item.priority)}`,background:s.done?priDot(item.priority):"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                      {s.done&&<span style={{fontSize:8,color:"#fff",fontWeight:900}}>✓</span>}
                    </div>
                    <span style={{fontSize:13,color:s.done?"#9CA3AF":"#374151",textDecoration:s.done?"line-through":"none",flex:1}}>{s.text}</span>
                    <button onClick={()=>deleteSubtask(item.id,s.id)} style={{background:"none",border:"none",color:"#D1D5DB",fontSize:12,cursor:"pointer",padding:0}}>✕</button>
                  </div>
                ))}
                <div style={{display:"flex",gap:6,marginTop:5}}>
                  <input style={{flex:1,background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:6,padding:"5px 8px",fontSize:12,outline:"none",fontFamily:"inherit"}}
                    placeholder="Add sub-task…" value={subInput} onChange={e=>setSubInput(e.target.value)}
                    onKeyDown={e=>{ if(e.key==="Enter"){addSubtask(item.id,subInput);setSubInput("");}}}
                  />
                  <button onClick={()=>{addSubtask(item.id,subInput);setSubInput("");}} style={{background:"#059669",border:"none",borderRadius:6,padding:"5px 10px",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:700}}>+</button>
                </div>
              </div>}
              {/* Notes preview */}
              {item.notes&&!isExpanded&&<div style={{fontSize:11,color:"#9CA3AF",marginTop:2,fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.notes}</div>}
            </div>
            {/* Right actions */}
            <div style={{display:"flex",flexDirection:"column",gap:3,flexShrink:0}}>
              <button onClick={()=>setDetailItem(item)} style={{background:"none",border:"none",color:"#9CA3AF",fontSize:13,cursor:"pointer",padding:"2px 4px"}}>✏️</button>
              {subTotal>0&&<button onClick={()=>setExpandedSubtasks(p=>{const n=new Set(p);n.has(item.id)?n.delete(item.id):n.add(item.id);return n;})} style={{background:"none",border:"none",color:"#9CA3AF",fontSize:11,cursor:"pointer",padding:"2px 4px"}}>◻</button>}
              <button onClick={()=>setDeleteConfirm(item)} style={{background:"none",border:"none",color:"#FCA5A5",fontSize:12,cursor:"pointer",padding:"2px 4px"}}>🗑</button>
            </div>
          </div>
        </div>
      );
    };

    const SectionHeader = ({label, count, color="#6B7280"}) => (
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"14px 0 6px",borderBottom:"2px solid #F3F4F6",marginBottom:2}}>
        <span style={{fontSize:12,fontWeight:700,color,letterSpacing:0.5,textTransform:"uppercase"}}>{label}</span>
        {count>0&&<span style={{fontSize:11,color:"#9CA3AF",background:"#F3F4F6",borderRadius:10,padding:"1px 7px",fontWeight:600}}>{count}</span>}
      </div>
    );

    // Quick add inline — Todoist style
    const [quickOpen, setQuickOpen] = useState(false);
    const [qTitle, setQTitle] = useState("");
    const [qDate, setQDate] = useState(todStr);
    const [qPriority, setQPriority] = useState("medium");
    const qRef = React.useRef(null);

    const quickSubmit = () => {
      if(!qTitle.trim()) return;
      const item = { ...{type:"task",category:"work",priority:qPriority,dueDate:qDate,dueTime:"",startTime:"",endTime:"",location:"",notes:"",estimatedMins:60,recurrence:"none",actionItems:[],subtasks:[]},
        id:`user_${Date.now()}`, title:qTitle.trim(), done:false, createdAt:new Date().toISOString() };
      const updated=[...items,item]; const clean=persist(updated,null); setItems(clean);
      if(gcalToken) setTimeout(()=>pushToGcal(item),100);
      setQTitle(""); setQDate(todStr); setQPriority("medium"); setQuickOpen(false);
    };

    return (
      <div style={{padding:"0 16px 96px",background:"#fff",minHeight:"100vh"}}>
        {/* Energy filter bar */}
        <div style={{display:"flex",gap:5,flexWrap:"wrap",paddingTop:10,paddingBottom:8,borderBottom:"1px solid #F3F4F6",marginBottom:4}}>
          <button style={{padding:"5px 11px",borderRadius:14,border:`1.5px solid ${!energyFilter?"#111827":"#E5E7EB"}`,background:!energyFilter?"#111827":"#fff",color:!energyFilter?"#fff":"#6B7280",fontSize:11,fontWeight:600,cursor:"pointer"}} onClick={()=>setEnergyFilter(null)}>All</button>
          {ENERGY_TAGS.map(tag=>(
            <button key={tag.value} style={{padding:"5px 11px",borderRadius:14,border:`1.5px solid ${energyFilter===tag.value?tag.color:"#E5E7EB"}`,background:energyFilter===tag.value?tag.bg:"#fff",color:energyFilter===tag.value?tag.color:"#6B7280",fontSize:11,fontWeight:600,cursor:"pointer"}} onClick={()=>setEnergyFilter(energyFilter===tag.value?null:tag.value)}>{tag.label}</button>
          ))}
        </div>

        {/* Overdue */}
        {applyEF(overdue).length>0&&<>
          <SectionHeader label="⚠ Overdue" count={applyEF(overdue).length} color="#DC2626"/>
          {applyEF(overdue).map(i=><TaskRow key={i.id} item={i}/>)}
        </>}

        {/* Today */}
        <SectionHeader label={`Today · ${MONTHS[now.getMonth()]} ${now.getDate()}`} count={applyEF(todayT).length} color="#059669"/>
        {applyEF(todayT).length===0&&<div style={{fontSize:13,color:"#9CA3AF",padding:"10px 0 6px",fontStyle:"italic"}}>No tasks today — enjoy! 🎉</div>}
        {applyEF(todayT).map(i=><TaskRow key={i.id} item={i}/>)}

        {/* Quick add row — Todoist style */}
        {!quickOpen?<div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0",cursor:"pointer",color:"#9CA3AF"}} onClick={()=>{setQuickOpen(true);setTimeout(()=>qRef.current?.focus(),50);}}>
          <div style={{width:20,height:20,borderRadius:"50%",border:"2px dashed #D1D5DB",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:14,lineHeight:1}}>+</span></div>
          <span style={{fontSize:14}}>Add task…</span>
        </div>:
        <div style={{background:"#FAFAFA",border:"1.5px solid #E5E7EB",borderRadius:10,padding:"12px",marginTop:6,marginBottom:6}}>
          <input ref={qRef} style={{width:"100%",background:"transparent",border:"none",fontSize:15,fontWeight:500,color:"#111827",outline:"none",fontFamily:"inherit",marginBottom:8}} placeholder="Task name…" value={qTitle} onChange={e=>setQTitle(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") quickSubmit(); if(e.key==="Escape") setQuickOpen(false); }} autoFocus/>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <input type="date" step="900" style={{fontSize:12,border:"1px solid #E5E7EB",borderRadius:6,padding:"4px 8px",color:"#374151",outline:"none"}} value={qDate} onChange={e=>setQDate(e.target.value)}/>
            {["high","medium","low"].map(p=>(
              <button key={p} style={{padding:"4px 9px",borderRadius:6,border:`1.5px solid ${qPriority===p?({high:"#DC2626",medium:"#F97316",low:"#3B82F6"}[p]):"#E5E7EB"}`,background:qPriority===p?({high:"#FEF2F2",medium:"#FFF7ED",low:"#EFF6FF"}[p]):"#fff",color:{high:"#DC2626",medium:"#F97316",low:"#3B82F6"}[p],fontSize:11,fontWeight:700,cursor:"pointer"}} onClick={()=>setQPriority(p)}>P{p==="high"?1:p==="medium"?2:3}</button>
            ))}
            <button onClick={quickSubmit} style={{padding:"5px 14px",borderRadius:7,background:"#111827",border:"none",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",marginLeft:"auto"}}>Add</button>
            <button onClick={()=>setQuickOpen(false)} style={{padding:"5px 10px",borderRadius:7,background:"transparent",border:"1px solid #E5E7EB",color:"#6B7280",fontSize:12,cursor:"pointer"}}>Cancel</button>
          </div>
        </div>}

        {/* Upcoming */}
        {applyEF(upcoming).length>0&&<>
          <SectionHeader label="Upcoming" count={applyEF(upcoming).length} color="#374151"/>
          {applyEF(upcoming).map(i=><TaskRow key={i.id} item={i}/>)}
        </>}

        {/* No due date */}
        {applyEF(noDue).length>0&&<>
          <SectionHeader label="No Due Date" count={applyEF(noDue).length} color="#9CA3AF"/>
          {applyEF(noDue).map(i=><TaskRow key={i.id} item={i}/>)}
        </>}

        {/* Completed accordion */}
        {applyEF(done).length>0&&<div style={{marginTop:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0",cursor:"pointer"}} onClick={()=>setShowCompleted(!showCompleted)}>
            <span style={{fontSize:12,fontWeight:700,color:"#9CA3AF",letterSpacing:0.5,textTransform:"uppercase"}}>Completed ({applyEF(done).length})</span>
            <span style={{color:"#9CA3AF",fontSize:12}}>{showCompleted?"▲":"▼"}</span>
          </div>
          {showCompleted&&applyEF(done).map(i=><TaskRow key={i.id} item={i}/>)}
        </div>}
      </div>
    );
  };

  // ── MEETINGS TAB ──
  const renderMeetings = () => {
    const now = new Date(); const todStr = todayKey();
    const upcoming = items.filter(i=>i.type==="appointment"&&!i.done&&i.dueDate>=todStr).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)||(a.startTime||"").localeCompare(b.startTime||""));
    const past = items.filter(i=>i.type==="appointment"&&(i.done||i.dueDate<todStr)).sort((a,b)=>b.dueDate.localeCompare(a.dueDate));

    const MeetingRow = ({item}) => {
      const countdown = getCountdown(item);
      const actionsPending = (item.actionItems||[]).filter(a=>!a.done).length;
      return (
        <div style={{background:"#fff",border:"1px solid #E5E7EB",borderLeft:`4px solid ${countdown?.pulse?"#DC2626":"#3B82F6"}`,borderRadius:10,padding:"12px 12px 10px",marginBottom:8,opacity:item.done||item.cancelled?0.5:1}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
            <div style={{flex:1,minWidth:0,paddingRight:8}}>
              <div style={{fontSize:15,fontWeight:600,color:"#111827",lineHeight:1.3,marginBottom:4}}>{item.title}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:12,color:"#3B82F6",fontWeight:500}}>📅 {item.dueDate===todStr?"Today":item.dueDate}</span>
                {item.startTime&&<span style={{fontSize:12,color:"#374151",fontWeight:500}}>{fmt(item.startTime)} – {fmt(item.endTime)}</span>}
                {item.startTime&&item.endTime&&<span style={{fontSize:11,color:"#9CA3AF"}}>{durLabel(item.startTime,item.endTime)}</span>}
                {item.location&&<span style={{fontSize:11,color:"#6B7280"}}>📍 {item.location}</span>}
                {item.fromGcal&&<span style={{fontSize:10,color:"#059669",background:"#F0FDF4",borderRadius:4,padding:"1px 6px",fontWeight:600}}>GCal</span>}
                {actionsPending>0&&<span style={{fontSize:10,color:"#0D9488",background:"#F0FDFA",borderRadius:4,padding:"1px 6px",fontWeight:700}}>✅ {actionsPending} actions</span>}
              </div>
            </div>
            {countdown&&<span style={{fontSize:11,fontWeight:700,color:countdown.color,background:countdown.pulse?"#FEF2F2":"#FFF7ED",borderRadius:7,padding:"3px 8px",flexShrink:0,border:`1px solid ${countdown.color}33`}}>{countdown.label}</span>}
          </div>
          {/* Action items preview */}
          {(item.actionItems||[]).filter(a=>!a.done).slice(0,2).map(a=>(
            <div key={a.id} style={{fontSize:11,color:"#0D9488",display:"flex",gap:5,alignItems:"center",marginTop:2}}>
              <span>→</span><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.text}</span>
            </div>
          ))}
          <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
            <button onClick={()=>setDetailItem(item)} style={{fontSize:11,color:"#3B82F6",background:"#EFF6FF",border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontWeight:600}}>✏️ Edit / Actions</button>
            {!item.done&&!item.cancelled&&<button onClick={()=>cancelItem(item.id)} style={{fontSize:11,color:"#6B7280",background:"#F3F4F6",border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontWeight:600}}>✕ Cancel</button>}
            <button onClick={()=>setDeleteConfirm(item)} style={{fontSize:11,color:"#EF4444",background:"#FEF2F2",border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontWeight:600}}>🗑 Delete</button>
          </div>
        </div>
      );
    };

    // Group upcoming by date
    const byDate = {};
    upcoming.forEach(m=>{ if(!byDate[m.dueDate]) byDate[m.dueDate]=[]; byDate[m.dueDate].push(m); });

    return (
      <div style={{padding:"10px 16px 96px",background:"#fff",minHeight:"100vh"}}>
        {Object.keys(byDate).length===0&&<div style={{textAlign:"center",padding:"40px 16px",color:"#9CA3AF"}}><div style={{fontSize:40,marginBottom:8}}>📅</div><div style={{fontSize:15,fontWeight:600}}>No upcoming meetings</div><div style={{fontSize:12,marginTop:4}}>Pull from GCal to import your calendar</div></div>}
        {Object.keys(byDate).sort().map(dk=>{
          const d=new Date(dk); const isToday=dk===todStr;
          return (
            <div key={dk} style={{marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:isToday?"#059669":"#374151",marginBottom:8,paddingBottom:6,borderBottom:"2px solid "+(isToday?"#D1FAE5":"#F3F4F6")}}>
                {isToday?"📍 Today — ":""}{DAYS_FULL[d.getDay()]}, {MONTHS[d.getMonth()]} {d.getDate()}
              </div>
              {byDate[dk].map(m=><MeetingRow key={m.id} item={m}/>)}
            </div>
          );
        })}
        {past.length>0&&<div style={{marginTop:12}}>
          <div style={{fontSize:12,fontWeight:700,color:"#9CA3AF",letterSpacing:0.5,textTransform:"uppercase",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:8}} onClick={()=>setShowCompleted(!showCompleted)}>
            Past Meetings ({past.length}) <span>{showCompleted?"▲":"▼"}</span>
          </div>
          {showCompleted&&past.slice(0,10).map(m=><MeetingRow key={m.id} item={m}/>)}
        </div>}
      </div>
    );
  };

  // Action Items Overview — all pending action items from all meetings
  const renderActionItemsOverview = () => {
    const allActions = [];
    items.filter(i=>i.type==="appointment"&&!i.done).forEach(meeting=>{
      (meeting.actionItems||[]).filter(a=>!a.done).forEach(action=>{
        allActions.push({ action, meeting });
      });
    });
    if(!allActions.length) return null;
    return (
      <div style={{...S.card,marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={S.secTitle}>📋 Meeting Action Items</div>
          <span style={{fontSize:10,color:"#0D9488",background:"#F0FDFA",borderRadius:6,padding:"2px 8px",fontWeight:700}}>{allActions.length} pending</span>
        </div>
        {allActions.map(({action,meeting})=>(
          <div key={action.id} style={{display:"flex",alignItems:"flex-start",gap:9,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
            <div style={{width:18,height:18,minWidth:18,borderRadius:5,border:"2px solid #0D9488",background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",marginTop:1}} onClick={()=>toggleActionItem(meeting.id,action.id)}>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,color:C.text,lineHeight:1.4}}>{action.text}</div>
              <div style={{fontSize:10,color:C.textL,marginTop:2}}>📅 {meeting.title} · {meeting.dueDate}</div>
            </div>
            <span style={{fontSize:10,color:C.blue,background:C.blueL,borderRadius:6,padding:"2px 8px",cursor:"pointer",fontWeight:700,flexShrink:0}} onClick={()=>{ promoteActionItem(meeting,action); }}>→ Task</span>
          </div>
        ))}
      </div>
    );
  };

  // ── FOCUS MODE RENDER ──
  const renderFocusMode = () => {
    const urgent = [...items].filter(i=>!i.done&&i.type==="task").sort((a,b)=>{
      const s = {overdue:0,due_soon:1,scheduled:2,unscheduled:3};
      return (s[getTaskStatus(a)]||3)-(s[getTaskStatus(b)]||3);
    })[0];
    const nextMeeting = items.filter(i=>i.type==="appointment"&&!i.done&&i.dueDate>=todayKey()).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)||(a.startTime||"").localeCompare(b.startTime||""))[0];
    return (
      <div style={{padding:"0 0 80px"}}>
        <div style={{background:"linear-gradient(135deg,#1E3A8A,#0EA5E9)",borderRadius:16,padding:"16px",marginBottom:12,color:"#fff"}}>
          <div style={{fontSize:10,fontWeight:800,letterSpacing:2,textTransform:"uppercase",opacity:.7,marginBottom:4}}>🎯 Focus Mode</div>
          <div style={{fontSize:11,opacity:.6}}>Showing only what matters right now</div>
        </div>
        {urgent?<div>
          <div style={{fontSize:10,fontWeight:800,color:C.textL,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Most Urgent Task</div>
          <ItemCard item={urgent} showDate/>
        </div>:<div style={S.empty}>🎉 No urgent tasks!</div>}
        {nextMeeting&&<div style={{marginTop:16}}>
          <div style={{fontSize:10,fontWeight:800,color:C.textL,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Next Meeting</div>
          <ItemCard item={nextMeeting} showDate/>
        </div>}
      </div>
    );
  };

  const renderAll = () => {
    const allP=items.filter(i=>!i.done&&i.type==="task"); const hi=allP.filter(i=>i.priority==="high").length; const md=allP.filter(i=>i.priority==="medium").length; const lo=allP.filter(i=>i.priority==="low").length; const mt=items.filter(i=>i.type==="appointment"&&!i.done).length;
    return (<>
      <div style={S.card}><div style={S.secTitle}>All Outstanding</div>
        <div style={S.pillRow}>
          {(filterType==="all"||filterType==="task")&&<><div style={S.pill(C.red,C.redL)}>🔴 {hi} high</div><div style={S.pill(C.amber,C.amberL)}>🟡 {md} med</div><div style={S.pill(C.green,C.greenL)}>🟢 {lo} low</div></>}
          {(filterType==="all"||filterType==="appointment")&&<div style={S.pill(C.blue,C.blueL)}>📅 {mt} meetings</div>}
        </div>

                Total items: <strong>{items.length}</strong><br/>

                <strong>How to sync between them:</strong><br/>
                1. Add tasks on either device/browser<br/>
                2. Open Sync tab → tap <strong>⬇️ Pull from GCal</strong><br/>
                GCal is the shared bridge between all your devices ✅
              </div>
            </div>

            {/* Sync log */}
            {syncLog.length>0&&<div style={{background:C2.card,borderRadius:14,padding:16,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
              <div style={{fontSize:11,fontWeight:800,color:C2.textL,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Activity Log</div>

            </div>}

        {tab==="reminders" && (

                <div key={r.id} style={S.remCard}>

          <div style={S.row2}>

          {!isApt&&<><div style={S.lbl}>Est. Time</div><div style={S.estRow}>{[30,60,90,120].map(m=><button key={m} style={S.estBtn(form.estimatedMins===m)} onClick={()=>setForm({...form,estimatedMins:m})}>{m<60?m+"m":m/60+"h"}</button>)}</div>
          <button style={{width:"100%",padding:"10px",background:"linear-gradient(135deg,#059669,#0D9488)",border:"none",borderRadius:11,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",marginBottom:9}} onClick={()=>{
            const WSTART=9*60+30,WEND=18*60,LSTART=12*60+30,LEND=14*60;
            const dur=form.estimatedMins||60;
            let found=false;
            const startFrom=form.dueDate?new Date(form.dueDate):new Date();
            for(let day=0;day<14&&!found;day++){
              const tryDate=addDays(startFrom,day);
              const dow=tryDate.getDay();
              if(dow===0||dow===6) continue;
              const dk=toKey(tryDate);
              // Build busy slots from ALL scheduled items on this day
              const busy=items.filter(i=>i.dueDate===dk&&!i.done).map(i=>{
                const s=toMins(i.startTime||i.dueTime||"00:00");
                const e=i.endTime?toMins(i.endTime):s+(i.estimatedMins||60);
                return {s,e};
              }).concat([{s:LSTART,e:LEND}]).filter(b=>b.s>0||b.e>0).sort((a,b)=>a.s-b.s);
              let cur=WSTART;
              let scheduled=false;
              for(const b of busy){
                if(b.s<=cur){ cur=Math.max(cur,b.e); continue; }
                if(cur+dur<=b.s){ setForm({...form,dueDate:dk,dueTime:toHHMM(cur)}); found=true; scheduled=true; break; }
                cur=Math.max(cur,b.e);
              }
              if(!scheduled&&cur+dur<=WEND){ setForm({...form,dueDate:dk,dueTime:toHHMM(cur)}); found=true; }
            }
            if(!found) alert("No free slot in next 14 days!");
          }}>✨ Auto Schedule — Next Free Slot</button>
          div></>}

          <div style={S.mTitle}>🔔 New Reminder</div>
          <input style={S.inp} placeholder="Reminder title..." value={rform.title} onChange={e=>setRform({...rform,title:e.target.value})}/>
          <div style={S.row2}><div style={{flex:1}}><div style={S.lbl}>Date</div><input type="date" style={{...S.inp,marginBottom:0}} value={rform.date} onChange={e=>setRform({...rform,date:e.target.value})}/></div><div style={{flex:1}}><div style={S.lbl}>Time</div><input type="time" step="900" style={{...S.inp,marginBottom:0}} value={rform.time} onChange={e=>setRform({...rform,time:e.target.value})}/></div></div>
          <div style={{height:7}}/><input style={S.inp} placeholder="Notes..." value={rform.notes} onChange={e=>setRform({...rform,notes:e.target.value})}/>
          <button style={S.aBtn(C.amber)} onClick={addReminder}>🔔 Set Reminder</button>
          <button style={S.cancelBtn} onClick={()=>setModal(null)}>Cancel</button>
        </div></div>
      )}

      {/* Delete Confirm Modal */}
      {deleteConfirm&&<div style={S.overlay} onClick={()=>setDeleteConfirm(null)}><div style={{...S.sheet,padding:"18px 15px 36px"}} onClick={e=>e.stopPropagation()}>
        <div style={S.mTitle}>🗑 Delete Item</div>
        <div style={{fontSize:14,color:C.textM,marginBottom:12}}>Delete <strong>"{deleteConfirm.title}"</strong>?{deleteConfirm.gcalId?" This will also remove it from Google Calendar.":""}</div>
        <div style={{display:"flex",gap:8}}>
          <button style={{...S.aBtn(C.red),flex:1,marginTop:0}} onClick={()=>{ deleteItem(deleteConfirm.id); setDeleteConfirm(null); }}>🗑 Delete</button>
          <button style={{flex:1,padding:"13px",background:"transparent",border:`1.5px solid ${C.border}`,borderRadius:12,color:C.textL,fontSize:14,fontWeight:700,cursor:"pointer"}} onClick={()=>setDeleteConfirm(null)}>Cancel</button>
        </div>
      </div></div>}

      {/* PWA Install Banner */}
      {showPWABanner&&<div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#1E40AF",padding:"10px 14px",zIndex:500,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{color:"#fff",fontSize:12,fontWeight:700}}>📱 Add to Home Screen for notifications!</div>
        <div style={{display:"flex",gap:7}}>
          <button style={{background:"#fff",border:"none",borderRadius:8,padding:"5px 10px",color:C.blue,fontWeight:700,fontSize:11,cursor:"pointer"}} onClick={()=>{ if(deferredPrompt){deferredPrompt.prompt();setShowPWABanner(false);} }}>Install</button>
          <button style={{background:"none",border:"1.5px solid rgba(255,255,255,0.5)",borderRadius:8,padding:"5px 8px",color:"#fff",fontSize:11,cursor:"pointer"}} onClick={()=>setShowPWABanner(false)}>✕</button>
        </div>
      </div>}

      {deferItem&&<div style={S.overlay} onClick={()=>setDeferItem(null)}><div style={{...S.sheet,padding:"18px 15px 36px"}} onClick={e=>e.stopPropagation()}><div style={S.mTitle}>↷ Defer to Next Week</div><div style={{fontSize:14,color:C.textM,marginBottom:12}}>Move <strong>"{deferItem.title}"</strong>?</div><div style={{background:C.greenL,border:"1.5px solid #A7F3D0",borderRadius:11,padding:"11px",marginBottom:14,fontSize:13,color:"#065F46"}}>New date: <strong>{toKey(addDays(new Date(deferItem.dueDate),7))}</strong></div><button style={S.aBtn(C.purple)} onClick={()=>deferToNextWeek(deferItem)}>↷ Move to Next Week</button><button style={S.cancelBtn} onClick={()=>setDeferItem(null)}>Cancel</button></div></div>}

      {extendItem&&<div style={S.overlay} onClick={()=>setExtendItem(null)}><div style={{...S.sheet,padding:"18px 15px 36px"}} onClick={e=>e.stopPropagation()}><div style={S.mTitle}>+ Add More Time</div><div style={{fontSize:13,color:C.textM,marginBottom:4}}>"{extendItem.title}"</div><div style={{fontSize:11,color:C.textL,marginBottom:14}}>Current: <strong>{extendItem.estimatedMins||60}m</strong></div><div style={{display:"flex",gap:7,marginBottom:10}}>{[30,60,90,120].map(m=><button key={m} style={{flex:1,padding:"13px 0",borderRadius:11,border:`1.5px solid ${C.border}`,background:"#F8FAFC",color:C.blue,fontWeight:800,fontSize:13,cursor:"pointer"}} onClick={()=>extendTime(extendItem,m)}>+{m<60?m+"m":m/60+"h"}</button>)}</div><button style={S.cancelBtn} onClick={()=>setExtendItem(null)}>Cancel</button></div></div>}

      {detailItem&&<DetailModal/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
